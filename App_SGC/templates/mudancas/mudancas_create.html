<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/mudancas.css">

    <style>
        /* Espaçamento entre as colunas */
        .container-cols {
            display: flex;
            gap: 20px; 
        }
        /* Cada coluna ocupa o mesmo espaço */
        .input-col {
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        /* Espaçamento entre as linhas */
        .input-bottom {
            margin-bottom: 30px; 
        }
        /* Espaçamento entre o label e o input */
        .input-bottom label {           
            margin-bottom: 5px; 
        }
        /* Define o tamanho dos campos input */
        input[type="text"], input[type="date"], input[type="time"], select.form-control-sm {
            width: 220px;
            height: 30px;
            margin: auto;
        }
        /* Define o tamanho do botão salvar */
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
           
           $(document).ready(function() {
                $('#cpf_condomino').mask('000.000.000-00');

                $('#bloco_id').change(function() {
                    var blocoId = $(this).val();
                    if (blocoId) {
                        $.ajax({
                            url: "{% url 'filtrar_unidades' %}",
                            data: { 'bloco_id': blocoId },
                            success: function(data) {
                                $('#unidade_id').empty();
                                $('#unidade_id').append('<option value="">Unidade</option>');
                                $.each(data, function(key, value) {
                                    $('#unidade_id').append('<option value="' + value.unidade_id + '">' + value.unidade + '</option>');
                                });
                            }
                        });
                    } else {
                        $('#unidade_id').empty();
                        $('#unidade_id').append('<option value="">Unidade</option>');
                    }
                });

                function validaCPF(cpf) {
                    cpf = cpf.replace(/\D+/g, '');
                    if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

                    let soma = 0, resto;
                    for (let i = 1; i <= 9; i++) soma += parseInt(cpf.charAt(i - 1)) * (11 - i);
                    resto = (soma * 10) % 11;
                    if (resto === 10 || resto === 11) resto = 0;
                    if (resto !== parseInt(cpf.charAt(9))) return false;

                    soma = 0;
                    for (let i = 1; i <= 10; i++) soma += parseInt(cpf.charAt(i - 1)) * (12 - i);
                    resto = (soma * 10) % 11;
                    if (resto === 10 || resto === 11) resto = 0;
                    return resto === parseInt(cpf.charAt(10));
                }

                $('#btnsalvar').click(function(event) {
                    event.preventDefault();

                    const cpfCondominoInput = $('#cpf_condomino');
                    const cpfCondominoSemMascara = cpfCondominoInput.val().replace(/\D+/g, '');
                    const formErrorsDiv = $('#form_errors');

                    formErrorsDiv.text('');
                    $('.text-danger').text('');

                    if (!validaCPF(cpfCondominoSemMascara)) {
                        formErrorsDiv.text('CPF inválido.');
                        cpfCondominoInput.focus();
                        return false;
                    }

                    var campos = [
                        $('#cpf_condomino'),
                        $('#bloco_id'),
                        $('#unidade_id'),
                        $('#data_mudanca'),
                        $('#hora_mudanca'),
                        $('#transportadora'),
                        $('#placa_veiculo_transportadora')
                    ];

                    var valid = true;
                    for (var i = 0; i < campos.length; i++) {
                        if (!campos[i].val()) {
                            campos[i][0].setCustomValidity("Preencha este campo");
                            campos[i].focus();
                            campos[i].blur();
                            campos[i][0].reportValidity();
                            valid = false;
                            break;
                        } else {
                            campos[i][0].setCustomValidity("");
                        }
                    }

                    if (valid) {
                        $('#cpf_condomino').val(cpfCondominoSemMascara);
                        $('form').off('submit').submit();
                    }
                });
            });

    </script>
</head>
<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'mudancas_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">CADASTRO DE MUDANÇAS</h1><br>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'mudancas_create' %}">
                {% csrf_token %}

                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="container-cols d-flex justify-content-center">
                
                    <!-- Coluna 1 -->
                    <div id="coluna1" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="cpf_condomino" class="form-label">*CPF do Condômino:</label><br>
                            <input type="text" class="form-control-sm" id="cpf_condomino" name="cpf_condomino" tabindex="1" required autofocus>
                        </div>

                        <div class="input-bottom">
                            <label for="data_mudanca" class="form-label">*Data da mudança:</label><br>
                            <input type="date" class="form-control-sm" id="data_mudanca" name="data_mudanca" tabindex="4" required>
                        </div>

                        <div class="input-bottom">
                            <label for="placa_veiculo_transportadora" class="form-label">*Placa veículo:</label><br>
                            <input type="text" class="form-control-sm" id="placa_veiculo_transportadora" name="placa_veiculo_transportadora" minlength="7" maxlength="7" 
                                oninput="this.value = this.value.toUpperCase()" tabindex="7" required>
                        </div>
                    </div>

                    <!-- Coluna 2 -->
                    <div id="coluna2" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="bloco_id" class="form-label-sm">*Bloco:</label><br>
                            <select class="form-control-sm" id="bloco_id" name="bloco_id" tabindex="2" required>
                                <option value="">Bloco</option>
                                {% for bloco in blocos %}
                                    <option value="{{ bloco.bloco_id }}">{{ bloco.bloco }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="input-bottom">
                            <label for="hora_mudanca" class="form-label">*Hora da mudança:</label><br>
                            <input type="time" class="form-control-sm" id="hora_mudanca" name="hora_mudanca" tabindex="5" required>
                        </div>

                    </div>

                     <!-- Coluna 3 -->
                    <div id="coluna3" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="unidade" class="form-label">*Unidade:</label><br>
                            <select class="form-control-sm" id="unidade_id" name="unidade_id" tabindex="3" required>
                                <option value="">Unidade</option>
                                {% for unidade in unidades %}
                                    <option value="{{ unidade.unidade_id }}">{{ unidade.unidade }}</option>
                                {% endfor %}
                            </select>
                        </div>    
                        
                        <div class="input-bottom">
                            <label for="transportadora" class="form-label">*Transportadora:</label><br>
                            <input type="text" class="form-control-sm" id="transportadora" name="transportadora" maxlength="40" tabindex="6" required>
                        </div>  
                                                               
                    </div>

                </div>
                <br>
                <button type="submit" class="btn btn-primary" id="btnsalvar">SALVAR</button>
            </form>
        </div>
    </main>
</body>
</html>
