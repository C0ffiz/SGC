<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/espacos.css">
    <style>
        .container-cols {
            display: flex;
            gap: 20px; /* Espaçamento entre as colunas */
        }
        .input-col {
            flex: 1; /* Cada coluna ocupa o mesmo espaço */
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 40px; /* Espaçamento entre as linhas */
        }
        .form-control-sm {
            /* width: 50%;  */
        }
        input[type="text"], input[type="date"], select {
            width: 220px;
            height: 30px;
        }   
        .input-bottom {
            margin-bottom: 20px; /* Aumenta a distância entre as divs verticalmente */
            margin-right: 20px; /* Aumenta a distância entre as divs horizontalmente */
        }    
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function(){
            
            $('#valor_espaco').mask('000.000.000,00', {reverse: true});

            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário

                // Validação dos campos obrigatórios
                var campos = [
                    $('#nome_espaco'),
                    $('#dsc_espaco'),
                    $('#tempo_espaco'),
                    $('#valor_espaco')
                ];

                var valid = true;
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo");
                        campos[i].focus();
                        campos[i].blur(); 
                        campos[i][0].reportValidity(); 
                        valid = false;
                        break; 
                    } else {
                        campos[i][0].setCustomValidity(""); 
                    }
                }

                if (valid) {
                    // Remover a máscara antes de enviar o formulário
                    $('#valor_espaco').val(function(index, value) {
                        return value.replace(/\./g, '').replace(',', '.');
                    });
                    $('form').off('submit').submit();
                }
            });
        });
    </script>
</head>

<body>

    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'espacos_list' %}">CONDOMINIUM</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="titulo">ALTERAÇÃO DOS ESPAÇOS PARA LOCAÇÃO</h1><br>

        <div class="painel" style="height: 500px;">

            <!-- O id serve para tirar a mascara do valor_espaco -->
            <form method="POST" id="form-espaco">
                {% csrf_token %}
                
                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger">
                    {% for message in messages %}
                        <div>{{ message }}</div>
                    {% endfor %}
                </div>                

                <div class="container-cols d-flex justify-content-center">
                
                    <!-- Coluna 1 -->
                    <div id="coluna1" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="nome_espaco" class="form-label">*Espaço para locação:</label> <br>
                            <input id="nome_espaco" name="nome_espaco" class="form-control-sm" type="text" 
                                value="{{ espaco.nome_espaco }}" maxlength="60" tabindex="1" required autofocus> <br>
                        </div> 

                        <div class="input-bottom">
                            <label for="tempo_espaco" class="form-label">*Tempo de locação/h:</label> <br>
                            <select id="tempo_espaco" name="tempo_espaco" class="form-control-sm {% if form.tempo_espaco.errors %}field-error{% endif %}" tabindex="3" required>
                                <option value="">---</option>
                                {% for key, value in form.tempo_espaco.field.choices %}
                                    <option value="{{ key }}" {% if form.instance.tempo_espaco == key %}selected{% endif %}>{{ value }}</option>
                                {% endfor %}
                            </select>
                        </div> 
    
                    </div>  
                
                    <!-- Coluna 2 -->
                    <div id="coluna2" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="dsc_espaco" class="form-label">*Dsc:</label> <br>
                            <input id="dsc_espaco" name="dsc_espaco" class="form-control-sm" type="text" 
                                value="{{ espaco.dsc_espaco }}" maxlength="135" required tabindex="2"><br>
                        </div>  
                        
                        <div class="input-bottom">
                            <label for="valor_espaco" class="form-label">*Valor reserva (R$):</label><br>
                            <input id="valor_espaco" name="valor_espaco" class="form-control-sm" type="text" 
                                value="{{ espaco.valor_espaco }}" required tabindex="4">
                        </div>                    

                    </div>
                    
                </div>  
                <br><br>

                <button id="btnsalvar" type="submit">SALVAR</button>
            </form>
        </div>
    </main>
</body>
</html>
