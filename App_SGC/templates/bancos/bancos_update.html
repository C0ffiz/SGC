<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <link rel="stylesheet" href="/static/css/bancos.css">

    <style>
        /* Espaçamento entre as colunas */
        .container-cols {
            display: flex;
            gap: 20px; 
        }
        /* Cada coluna ocupa o mesmo espaço */
        .input-col {
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        /* Espaçamento entre as linhas */
        .input-bottom {
            margin-bottom: 10px; 
        }
        /* Espaçamento entre o label e o input */
        .input-bottom label {           
            margin-bottom: 5px; 
        }
        /* Define o tamanho dos campos input */
        input[type="text"] {
            width: 220px;
            height: 30px;
            margin: auto;
        }
        /* Define o tamanho do botão salvar */
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>

    <script>
        $(document).ready(function() {
            // Máscaras para telefone e celular
            $('#telefone').mask('(00) 0000-0000');
            $('#celular').mask('(00) 00000-0000');

            // Máscara para 'agencia' com hífen antes do último dígito
            $('#agencia').mask('0000-0', {
                translation: {
                    '0': { pattern: /[0-9]/, optional: true }
                },
                reverse: true // Inverte a aplicação para que o último dígito fique sempre separado
            });

            // Máscara para 'conta_corrente' com hífen antes do último dígito
            $('#conta_corrente').mask('000000-0', {
                translation: {
                    '0': { pattern: /[0-9]/, optional: true }
                },
                reverse: true // Inverte a aplicação para que o último dígito fique sempre separado
            });

            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário

                // Remove as máscaras antes de enviar
                $('#telefone').val($('#telefone').cleanVal());
                $('#celular').val($('#celular').cleanVal());
                $('#agencia').val($('#agencia').cleanVal());
                $('#conta_corrente').val($('#conta_corrente').cleanVal());

                // Verifica os campos obrigatórios
                var campos = [
                    $('#nome_banco'),
                    $('#n_banco'),
                    $('#agencia'),
                    $('#conta_corrente')
                ];

                var valid = true; // Variável para controlar se todos os campos são válidos
                
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo");
                        campos[i].focus();
                        campos[i].blur(); // Força a exibição da mensagem pop-up
                        campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                        valid = false; // Define como falso se algum campo estiver vazio
                        break; // Para a execução do loop após encontrar o primeiro campo vazio
                    } else {
                        campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                    }
                }

                // Só envia o formulário se todos os campos estiverem válidos
                if (valid) {
                    $('form').off('submit').submit(); // Desvincula o evento de click e envia o formulário
                }
            });
        });
    </script>

</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'bancos_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">ALTERAÇÃO DE BANCO</h1><br>
        
        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'bancos_update' form.instance.pk %}">
                {% csrf_token %}

                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="container-cols d-flex justify-content-center">
                    <div id="coluna1" class="input-col-md-2">
                        <div class="input-bottom">
                            <label for="nome_banco" class="form-label">*Nome banco:</label><br>
                            <input type="text" class="form-control-sm" id="nome_banco" name="nome_banco" 
                            value="{{ banco.nome_banco }}" readonly>
                        </div>
                
                        <div class="input-bottom">
                            <label for="agencia" class="form-label">*Agência:</label><br>
                            <input type="text" class="form-control-sm" id="agencia" name="agencia" maxlength="6" 
                            value="{{ banco.agencia }}" readonly>
                        </div>

                        <div class="input-bottom">
                            <label for="telefone" class="form-label">Telefone:</label><br>
                            <input type="text" class="form-control-sm" id="telefone" name="telefone" maxlength="1" 
                            value="{{ banco.telefone }}" tabindex="1" autofocus>
                        </div>   

                        <div class="input-bottom">
                            <label for="email" class="form-label">E-mail:</label><br>
                            <input type="text" class="form-control-sm" id="email" name="email" maxlength="40" 
                            value="{{ banco.email }}"tabindex="3">
                        </div>            
                    </div>
                
                    <div id="coluna2" class="input-col-md-2">
                        <div class="input-bottom">
                            <label for="n_banco" class="form-label">*Nº banco:</label><br>
                            <input type="text" class="form-control-sm" id="n_banco" name="n_banco" maxlength="4" 
                            value="{{ banco.n_banco }}" readonly>
                        </div>
                
                        <div class="input-bottom">
                            <label for="conta_corrente" class="form-label">*Conta corrente:</label><br>
                            <input type="text" class="form-control-sm" id="conta_corrente" name="conta_corrente" maxlength="7"
                            value="{{ banco.conta_corrente }}" readonly>
                        </div>

                        <div class="input-bottom">
                            <label for="celular" class="form-label">Celular:</label><br>
                            <input type="text" class="form-control-sm" id="celular" name="celular" maxlength="11" tabindex="2"
                            value="{{ banco.celular }}">
                        </div> 
                    </div>
                </div>
                <br><br>
                
                <!-- <button id="btnsalvar" type="submit">SALVAR</button> -->
                <input type="submit" class="btn btn-primary" id="btnsalvar" value="SALVAR">
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybB26HhhmMk4XlWl1qZzD/5q5sb1QZlw76i8FhT1GgIWHTw4u" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-p8Mhb8dPzS4XwHkQWf9Bxz1tWfbVvnBKiG1xjYflWzUozzV4dP0wH7fQZSMfZj1g" crossorigin="anonymous"></script>
</body>
</html>
