<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/metas.css">

    <style>
        .container-cols {
            display: flex;
            gap: 0; /* Remove o espaçamento entre as colunas */
        }
        .input-bottom {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 5px; /* Reduz ainda mais o espaçamento entre as divs */
        }
        .input-col .input-row {
            margin-bottom: 10px; /* Diminui o espaçamento entre as linhas */
        }
        input[type="text"], input[type="date"], select.form-control-sm {
            width: 220px;
            height: 30px;
            margin: auto;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }        
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

    <script>
            
        $(document).ready(function() {

            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário

                const formErrorsDiv = $('#form_errors');

                // Limpa as mensagens de erro
                formErrorsDiv.text('');
                $('.text-danger').text('');

                // Verifica os campos obrigatórios
                var campos = [
                    $('#cpf_colaborador'),
                    $('#dsc_meta'),
                    $('#data_termino')
                ];

                var valid = true; // Variável para controlar se todos os campos são válidos
            
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo");
                        campos[i].focus();
                        campos[i].blur(); // Força a exibição da mensagem pop-up
                        campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                        valid = false; // Define como falso se algum campo estiver vazio
                        break; // Para a execução do loop após encontrar o primeiro campo vazio
                    } else {
                        campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                    }
                }

                // Só envia o formulário se todos os campos estiverem válidos
                if (valid) {

                    $('form').off('submit').submit(); // Desvincula o evento de click e envia o formulário
                }
            });
        });

    </script>
     
</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'metas_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">CADASTRO DE METAS</h1><br>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'metas_create' %}">
                {% csrf_token %}

                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="input-bottom">
                    <label for="cpf_colaborador" class="form-label">*Colaborador:</label>
                    <select class="form-control-sm" id="cpf_colaborador" name="cpf_colaborador" tabindex="1" required autofocus>
                        <option value="">Colaborador</option>
                        {% for colaborador in colaboradores_list %}
                            <option value="{{ colaborador.id }}"> {{ colaborador.cpf_colaborador }} {{ colaborador.nome_colaborador }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-bottom">
                    <label for="dsc_meta" class="form-label">*Meta:</label>
                    <input type="text" class="form-control-sm" id="dsc_meta" name="dsc_meta" maxlength="60" tabindex="2" required>
                </div>

                <div class="input-bottom">
                    <label for="data_termino" class="form-label">*Data término:</label>
                    <input type="date" class="form-control-sm" id="data_termino" name="data_termino" tabindex="3" required>
                </div>
                <br><br>

                <button id="btnsalvar" type="submit">SALVAR</button>
            
            </form>
        </div>
    </main>

</body>
</html>
