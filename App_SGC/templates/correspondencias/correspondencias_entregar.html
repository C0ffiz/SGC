<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/correspondencias.css">
        <style>
            .input-bottom {
                margin-bottom: 5px;
            }
            input[type="text"], input[type="date"], input[type="password"], input[type="number"], select {
                width: 220px;
                height: 30px;
            }
            .container-cols {
                display: flex;
                gap: 20px;
            }
            .input-col {
                flex: 1;
                display: flex;
                flex-direction: column;
            }
            .input-col .input-row {
                margin-bottom: 20px;
            }
             /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
            .text-danger {
                font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
                height: 30px; /* Espaço reservado para a mensagem de erro */
                line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
                margin-bottom: 20px; /* Margem inferior */
                color: rgb(246, 244, 244) !important; /* Cor branca */
                font-weight: bold; /* Negrito */
            }   
        </style>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script> 

    </head>

    <body>
        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'correspondencias_list' %}">CONDOMINIUM</a>
            </div>
        </nav>

        <main class="container">
            <h1 id="titulo">ENTREGA DE CORRESPONDÊNCIA</h1>
            <div class="painel" style="height: 500px;">
                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- Exibir mensagem de erro com espaço fixo -->
                    <div class="text-danger">
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    </div>


                    <div id="bloco1" class="container-cols d-flex justify-content-center">
                        
                        <div id="coluna" class="input-col-md-2">

                            <div class="input-bottom">
                                <label for="data_retirada_correspondencia" class="form-label">*Dsc:</label> <br>
                                <input id="data_retirada_correspondencia" name="data_retirada_correspondencia" class="form-control-sm" type="date" tabindex="2" 
                                    value="{{ correspondencia.dsc_correspondencia }}" required>
                            </div>
                            
                            <div class="input-bottom">
                                <label for="retirante_correspondencia" class="form-label">*Retirada por:</label> <br>
                                <input id="retirante_correspondencia" name="retirante_correspondencia" class="form-control-sm" type="text" maxlength="60" tabindex="2" required>
                            </div>

                        </div>                        
                       
                    </div>
                    <br><br><br>

                    <div>
                        <button id="btnsalvar" class="btn btn-primary col-2 me-2 btn-block" type="submit">SALVAR</button>                                              
                    </div>
                </form>
            </div>
        </main>      
    </body>
</html>
