<!doctype html>
    <html lang="en">
        <head>
            <!-- Required meta tags -->
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">

            <!-- Bootstrap CSS -->
            <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous"> -->
            <link rel="stylesheet" href="/static/css/home.css">
            
            
            <title>SGC</title>
        </head>

        <body>

            <nav style="background-color:rgb(4, 37, 86) !important;" class="navbar navbar-light bg-light">
                <div class="container-fluid">
                    <span id="titulo"  class="navbar-brand mb-0 h1">CONDOMINIUM MANAGEMENT SYSTEM</span>
                </div>
            </nav>

            <div class="container">
                <img id="imagem" src="https://grandaladvocacia.com.br/wp-content/uploads/2023/07/site.jpg" alt="nao"> <br><br><br>        
                <div class="painel">
                    
                   
                    <form action="/signup" method="post">
                        {% csrf_token %}                    
                        <div class="input-bottom">
                            <a>User</a>  <br>
                            <input  name="usuario" class="form-control-sm" type="text">
                        </div>
                        
                        <div class="input-top input-bottom">
                            <a>Password</a> <br>
                            <input name="senha" class="form-control-sm" type="password">
                        </div>
                        
                        <div class="input-top input-bottom cpf">
                            <a>CPF</a> <br>
                            <input name="cpf" class="form-control-sm" type="number">
                        </div>
                        
                        <div class="input-top input-bottom">
                            <a>Nivel</a> <br>
                            <input name="nivel" class="form-control-sm" type="number">
                        </div>
                        
                        <div class="input-top input-bottom">
                            <a>Condominio</a> <br>
                            <input name="condominio" class="form-control-sm" type="number">
                        </div>
                        
                        <button class="form-control-sm input-top" type="submit"> REGISTER</button>

                    </form>
                </div>
            </div>
            
            <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> -->
     
        </body>
    </html>
