<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/pets.css">

    <style>
        /* Espaçamento entre as colunas */
        .container-cols {
            display: flex;
            gap: 20px; 
        }
        /* Cada coluna ocupa o mesmo espaço */
        .input-col {
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        /* Espaçamento entre as linhas */
        .input-bottom {
            margin-bottom: 30px; 
        }
        /* Espaçamento entre o label e o input */
        .input-bottom label {           
            margin-bottom: 5px; 
        }
        /* Define o tamanho dos campos input */
        input[type="text"], input[type="date"], input[type="time"], select.form-control-sm {
            width: 220px;
            height: 30px;
            margin: auto;
            font-size: 18px; /* Aumenta o tamanho das letras nos inputs */
        }
        /* Define o tamanho do botão salvar */
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
            font-size: 18px; /* Aumenta o tamanho do texto do botão */
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#cpf_condomino').mask('000.000.000-00');
            $('#btnsalvar').click(function(event) {
                 var cpf = $('#cpf_condomino').val().replace(/\D/g, '');
                 $('#cpf_condomino').val(cpf);
            });
        });
    </script>
</head>
<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'pets_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">ALTERAÇÃO DE PETS</h1>

        <div class="painel" style="height: 500px;">

            <form method="POST" action="{% url 'pets_update' pk=pets.pets_id %}">

                {% csrf_token %}

                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger">
                    {% if form_errors %}
                        <div>{{ form_errors }}</div>
                    {% endif %}
                </div>


                <div class="container-cols d-flex justify-content-center">

                    <!-- Coluna 1 -->
                    <div id="coluna1" class="input-col-md-2">
                
                        <div class="input-bottom">
                            <label for="cpf_condomino" class="form-label" style="font-size: 18px;">CPF do Condômino:</label><br>
                            <input type="text" class="form-control-sm" id="cpf_condomino" name="cpf_condomino" 
                                value="{{ pets.cpf_condomino }}" readonly>
                        </div>
                
                        <div class="input-bottom">
                            <label for="raca_pet" class="form-label" style="font-size: 18px;">Raça:</label><br>
                            <input type="text" class="form-control-sm" id="raca_pet" name="raca_pet" 
                                value="{{ pets.raca_pet }}" required tabindex="2">
                        </div>
                
                        <div class="input-bottom">
                            <label for="peso_pet" class="form-label" style="font-size: 18px;">Peso/kg:</label><br>
                            <input type="text" class="form-control-sm" id="peso_pet" name="peso_pet" 
                                value="{{ pets.peso_pet }}" required tabindex="4">
                        </div>
                    </div>
                
                    <!-- Coluna 2 -->
                    <div id="coluna2" class="input-col-md-2">
                
                        <div class="input-bottom">
                            <label for="nome_pet" class="form-label" style="font-size: 18px;">Nome do Pet:</label><br>
                            <input type="text" class="form-control-sm" id="nome_pet" name="nome_pet" 
                                value="{{ pets.nome_pet }}" required tabindex="1" autofocus>
                        </div>
                
                        <div class="input-bottom">
                            <label for="altura_pet" class="form-label" style="font-size: 18px;">Altura/cm:</label><br>
                            <input type="text" class="form-control-sm" id="altura_pet" name="altura_pet" 
                                value="{{ pets.altura_pet }}" required tabindex="3">
                        </div>

                    </div>

                </div>
                
                <br>
                <button id="btnsalvar" type="submit">SALVAR</button>
            </form>
        </div>
    </main>
</body>
</html>
