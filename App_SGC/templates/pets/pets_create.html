<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/pets.css">

    <style>
        /* Espaçamento entre as colunas */
        .container-cols {
            display: flex;
            gap: 20px; 
        }
        /* Cada coluna ocupa o mesmo espaço */
        .input-col {
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        /* Espaçamento entre as linhas */
        .input-bottom {
            margin-bottom: 10px; 
        }
        /* Espaçamento entre o label e o input */
        .input-bottom label {           
            margin-bottom: 5px; 
        }
        /* Define o tamanho dos campos input */
        input[type="text"], input[type="number"], input[type="date"], input[type="time"], select.form-control-sm {
            width: 220px;
            height: 30px;
            margin: auto;
        }
        /* Define o tamanho do botão salvar */
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#cpf_condomino').mask('000.000.000-00');
            // Sequência nos campos para consistência
            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário
                
                var campos = [
                    $('#cpf_condomino'),
                    $('#nome_pet'),
                    $('#raca_pet'),
                    $('#altura_pet'),
                    $('#peso_pet')
                ];

                var valid = true; // Variável para controlar se todos os campos são válidos
                
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo");
                        campos[i].focus();
                        campos[i].blur(); // Força a exibição da mensagem pop-up
                        campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                        valid = false; // Define como falso se algum campo estiver vazio
                        break; // Para a execução do loop após encontrar o primeiro campo vazio
                    } else {
                        campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                    }
                }
                
                // Se todos os campos forem válidos, submete o formulário
                if (valid) {
                    $('form').off('submit').submit();
                }
            });
        });
    </script>
</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'pets_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">CADASTRO DE PETS</h1>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'pets_create' %}">
                {% csrf_token %}

                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger">
                    {% if form_errors %}
                        <div>{{ form_errors }}</div>
                    {% endif %}
                </div>

                <div class="container-cols d-flex justify-content-center">

                    <!-- Coluna 1 -->
                    <div id="coluna1" class="input-col-md-2">
                        <div class="input-bottom">
                            <label for="cpf_condomino" class="form-label">*CPF do Condômino:</label><br>
                            <input type="text" class="form-control-sm" id="cpf_condomino" name="cpf_condomino" value="{{ request.POST.cpf_condomino }}" required tabindex="1" autofocus>
                        </div>
                
                        <div class="input-bottom">
                            <label for="raca_pet" class="form-label">*Raça:</label><br>
                            <input type="text" class="form-control-sm" id="raca_pet" name="raca_pet" value="{{ request.POST.raca_pet }}" maxlength="40" required tabindex="3">
                        </div>

                        <div class="input-bottom">
                            <label for="peso_pet" class="form-label">*Peso/kg:</label><br>
                            <input type="text" class="form-control-sm" id="peso_pet" name="peso_pet" 
                                value=""  
                                pattern="^\d{1,2},\d{1}$" 
                                oninput="
                                    this.value = this.value
                                        .replace(/[^0-9,]/g, '')  // Permite apenas números e vírgula
                                        .replace(/(,.*?),(.*)/g, '$1')  // Impede mais de uma vírgula
                                        .replace(/^(\d{2})\d+/g, '$1')  // Limita os inteiros a no máximo 2 dígitos
                                        .replace(/(,\d)\d+/g, '$1');    // Limita a parte decimal a 1 dígito
                                " 
                                placeholder="Ex: 10,5"
                                required tabindex="5">
                        </div>                  
                        
                    </div>
                
                    <!-- Coluna 2 -->
                    <div id="coluna2" class="input-col-md-2">
                        <div class="input-bottom">
                            <label for="nome_pet" class="form-label">*Nome do Pet:</label><br>
                            <input type="text" class="form-control-sm" id="nome_pet" name="nome_pet" value="{{ request.POST.nome_pet }}" maxlength="30" required tabindex="2">
                        </div>
                
                        <div class="input-bottom">
                            <label for="altura_pet" class="form-label">*Altura/cm:</label><br>
                            <input type="number" class="form-control-sm" id="altura_pet" name="altura_pet" value="{{ request.POST.altura_pet }}" 
                                oninput="if(this.value.length > 3) this.value = this.value.slice(0, 3);" required tabindex="4">
                        </div>
                    </div>

                </div>
                
                <br>
                <button id="btnsalvar" type="submit">SALVAR</button>
            </form>
        </div>
    </main>
</body>
</html>
