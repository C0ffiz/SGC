<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
        <link rel="stylesheet" href="/static/css/contas_pagar.css">

    <style>
        .error-duplicate{
            background-color: transparent;
            color: #fff;
            text-decoration: none;
            border: 0;
            list-style-position: inside;
            padding: 0;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
        /* Dispõe os inputs em colunas */
        .colunas {
            display: flex;
            flex-direction: column; /* Coloca os elementos em coluna */
            align-items: center; /* Centraliza os elementos horizontalmente */
            justify-content: center;
            height: 100%; /* Ajuste conforme necessário */
        }

        .input-bottom {
            display: flex;
            flex-direction: column; /* Coloca a label em cima do input */
            align-items: center; /* Centraliza o texto da label */
            width: 100%; /* Ajusta conforme necessário */
            max-width: 300px; /* Limita a largura dos campos */
            margin-bottom: 0px; /* Reduz o espaçamento entre os campos */
        }

        .input-bottom label {
            margin-bottom: 5px; /* Define o espaço entre a label e o input */
            text-align: center; /* Centraliza o texto da label */
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }

    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function() {
            // Aplicar a máscara de moeda ao carregar a página
            $('#valor_pago').mask('0.000.000,00', {reverse: true});
    
            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário
                
                console.log($('#bancoCaixa').val())

                // Validação dos campos obrigatórios, na ordem desejada
                var campos = [
                    {campo: $('#bancoCaixa'), nome: ''},
                    {campo: $('#data_pagamento'), nome: ''},
                    {campo: $('#valor_pago'), nome: ''}            
                ];
    
                var valid = true;
    
                // Itera sobre os campos e aplica validação customizada
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].campo.val()) {
                        campos[i].campo[0].setCustomValidity(`Preencha o campo}`);
                        campos[i].campo[0].reportValidity();
                        valid = false;
                        break; // Interrompe a iteração ao encontrar o primeiro campo inválido
                    } else {
                        campos[i].campo[0].setCustomValidity(""); // Remove mensagem de erro se estiver válido
                    }
                }
    
                if (valid) {
                    // Remover a máscara de valor e data antes de enviar o formulário
                    $('#valor_pago').each(function() {
                        var valor = $(this).val().replace(/\./g, '').replace(',', '.');
                        $(this).val(valor);
                    });
    
                    $('#data_pagamento').each(function() {
                        var data = $(this).val().replace(/\//g, '-'); // Remove a máscara e transforma a data em formato AAAA-MM-DD
                        $(this).val(data);
                    });
    
                    // Submete o formulário após as correções
                    $('form').off('submit').submit();
                }
            });
        });
    </script>
    
</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'contas_pagar_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">PAGAMENTO DE CONTA</h1><br>
        
        <div class="painel" style="height: 500px;">
            <form method="post" action="{% url 'contas_pagar_pagar' pk=pk %}">
                {% csrf_token %}
               
                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="colunas">                  

                    <div class="input-bottom">
                        <label for="bancoCaixa" class="form-label">*Banco/Caixa:</label>
                        <select name="bancoCaixa" id="bancoCaixa" class="form-control-sm" tabindex="1" required autofocus>
                            <option value="">Banco/Caixa</option>
                        
                            {% for caixa in caixas %}
                            <option value="caixa_{{ caixa.caixa_id }}"> {{ caixa.nome_caixa }} </option>
                            {% endfor %}
                        
                            {% for banco in bancos %}
                            <option value="banco_{{ banco.banco_id }}"> {{ banco.conta_corrente }} {{ banco.nome_banco }} </option>
                            {% endfor %}
                        </select>                        
                    </div>
                    
                    <div class="input-bottom">
                        <label for="data_pagamento" class="form-label">*Data pagamento:</label>
                        <input type="date" class="form-control-sm" id="data_pagamento" name="data_pagamento" tabindex="2" required >
                    </div>

                    <div class="input-bottom">
                        <label for="valor_pago" class="form-label">*Valor pago:</label>
                        <input type="text" class="form-control-sm" id="valor_pago" name="valor_pago" tabindex="3" required>
                    </div>
                    

                </div> 
                <br><br>

                <button id="btnsalvar" type="submit" class="btn btn-primary btnsalvar">SALVAR</button>
                             
            </form>
        </div>
    </main>

    <script>
        $('form').submit(function() {
            $('#valor_pago').each(function(){
                var valor = $(this).val().replace(/\./g, '').replace(',', '.'); // Substitui pontos por vazio e vírgulas por ponto
                $(this).val(valor);
            });
        });

        document.addEventListener("DOMContentLoaded", function() {
            const dataPagamento = document.getElementById("data_pagamento");
            
            const today = new Date();
            const day = String(today.getDate()).padStart(2, '0');
            const month = String(today.getMonth() + 1).padStart(2, '0'); // Os meses começam do zero, então adicionamos +1
            const year = today.getFullYear();

            dataPagamento.value = `${year}-${month}-${day}`; // Formato AAAA-MM-DD para o input de tipo "date"
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybBogGzF9RAp6F3E6pbb7zJpPHT6f6Ffhh0GgiVNU7BRSK7jl" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-QF2mxF1WBbKV5wzELpLhjlbsABsUcQ8Lqyf2z5LN6go6abkFZxWfXaBgEKTt9iZS" crossorigin="anonymous"></script>
</body>
</html>
