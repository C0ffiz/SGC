<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/financeiro_estrutura.css">

    <style>
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
        }

        .input-bottom {
            margin-right: 1cm; /* Adiciona 1 cm de margem à direita */
        }

        /* Remove a margem direita da última div para evitar espaçamento extra */
        .horizontal-container .input-bottom:last-child {
            margin-right: 0;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
</head>
<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'financeiro_estrutura_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">CADASTRO PLANO DE CONTA</h1><br>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'financeiro_estrutura_create' %}">
                {% csrf_token %}

                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="horizontal-container">

                    <div class="input-bottom">
                        <label for="id_parent">Conta superior:</label>
                        <select name="parent" id="id_parent" class="form-control-sm">
                            <option value=""></option>
                            {% for categoria in categorias %}
                            <option value="{{ categoria.id }}">{{ categoria.get_nivel }} {{ categoria.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input-bottom">
                        <label for="id_nome">Conta:</label>
                        <input type="text" name="nome" id="id_nome" class="form-control-sm" oninput="this.value = this.value.toUpperCase()" required>
                    </div>
                    
                </div>   
                <br><br>
                
                <button type="submit" class="btn btn-primary" id="btnsalvar">SALVAR</button>
            </form>
        </div>
    </main>
</body>
</html>
