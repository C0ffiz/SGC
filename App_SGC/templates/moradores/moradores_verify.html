<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/moradores.css">
    <style>
        .input-bottom {
            margin-bottom: 5px;
        }
        input[type="text"], input[type="date"], input[type="password"], input[type="number"], select {
            width: 220px;
        }
        .container-cols {
            display: flex;
            gap: 20px;
        }
        .input-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 20px;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-top: 40px; /* Margem suprior entre o título e a mensagem */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
    $(document).ready(function(){
        $('#cpf_condomino').mask('000.000.000-00');
        $('#btnsalvar').click(function(event) {
            var cpf_condomino = $('#cpf_condomino').val().replace(/\D/g, '');
            $('#cpf_condomino').val(cpf_condomino);
        });
    });
    </script>
</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'moradores_list' %}">CONDOMINIUM</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="tituloVerify">CADASTRO DE MORADORES</h1>
        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'verificar_cpf_condomino' %}" id="cpfForm">
                {% csrf_token %}
                
                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div id = "containerVerify"  class="container d-flex justify-content-center">

                    <div class="input-bottom">
                        <label for="cpf_condomino" class="form-label">*CPF condômino:</label> <br>
                        <input class="form-control-sm" type="text" id="cpf_condomino" name="cpf_condomino" required autofocus>
                    </div>

                </div>
                <br><br><br>

                <button id="btnverifysalvar" type="submit">VERIFICAR</button>
            </form>
        </div>
    </main>

    <script>
        function validaCPF(cpf) {
            cpf = cpf.replace(/\D+/g, '');
            if (cpf.length !== 11) return false;
            if (/^(\d)\1+$/.test(cpf)) return false;
            let soma = 0, resto;
            for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;
            soma = 0;
            for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            return resto === parseInt(cpf.substring(10, 11));
        }

        document.querySelector('form').addEventListener('submit', function (event) {
            const cpfCondominoInput = document.getElementById('cpf_condomino');
            const formErrorsDiv = document.getElementById('form_errors');  // selecionar a div correta

            // Limpa a mensagem de erro anterior
            formErrorsDiv.textContent = '';

            // Valida o CPF
            if (!validaCPF(cpfCondominoInput.value)) {
                event.preventDefault();  // Previne o envio do formulário
                formErrorsDiv.textContent = 'CPF inválido';  // Adiciona a mensagem de erro
            }
        });

    </script>
</body>

</html>
