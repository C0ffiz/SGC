<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/moradores.css">

        <style>
            .input-bottom {
                margin-bottom: 5px;
            }
            input[type="text"], input[type="date"], input[type="password"], input[type="number"], select {
                width: 220px;
                height: 30px;
            }
            .container-cols {
                display: flex;
                gap: 20px;
            }
            .input-col {
                flex: 1;
                display: flex;
                flex-direction: column;
            }
            .input-col .input-row {
                margin-bottom: 20px;
            }
            /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
            .text-danger {
                font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
                height: 30px; /* Espaço reservado para a mensagem de erro */
                line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
                margin-bottom: 20px; /* Margem inferior */
                color: rgb(246, 244, 244) !important; /* Cor branca */
                font-weight: bold; /* Negrito */
            }

        </style>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>   
    </head>

    <body>
        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'moradores_list' %}">CONDOMINIUM</a>
            </div>
        </nav>

        <main class="container">
            <h1 id="titulo">ALTERAÇÃO DE MORADORES</h1>
            <div class="painel" style="height: 500px;">
                <form method="POST">
                    {% csrf_token %}
                    
                    <input type="hidden" name="cpf_condomino" value="{{ cpf_condomino }}">

                    <div class="text-danger">
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    </div>
                    
                    <!-- Coluna 1 -->
                    <div id="bloco1" class="container-cols d-flex justify-content-center">

                        <div id="coluna" class="input-col-md-2">
                            <div id="linha" class="input-row no-gutters">

                                <!-- Display the CPF condômino as readonly text -->
                                <div class="input-bottom">
                                    <label for="cpf_condomino" class="form-label" style="margin-left: -240px;">*CPF condômino:</label> <br>
                                    <input id="cpf_condomino" name="cpf_condomino" class="form-control-sm" type="text" style="margin-left: -240px;" 
                                        value="{{ form.instance.cpf_condomino.cpf_condomino|slice:':3' }}.{{ form.instance.cpf_condomino.cpf_condomino|slice:'3:6' }}.{{ form.instance.cpf_condomino.cpf_condomino|slice:'6:9' }}-{{ form.instance.cpf_condomino.cpf_condomino|slice:'9:' }}"  readonly="readonly">
                                </div>                                

                            </div>
                        </div> 
                    </div> 

                    <div id="bloco2" class="container-cols d-flex justify-content-center">
                        
                        <!-- Coluna 1 -->
                        <div id="coluna" class="input-col-md-2">

                            <div class="input-bottom"><br> 
                                <label for="cpf_morador">*CPF morador:</label> <br>
                                <input id="cpf_morador" name="cpf_morador" class="form-control-sm {% if form.cpf_morador.errors %}field-error{% endif %}" type="text" tabindex="1" 
                                value="{{ form.instance.cpf_morador }}" readonly>
                            </div> 

                            <div class="input-bottom">
                                <label for="data_nascimento_morador">*Data nascimento:</label> <br>
                                <input id="data_nascimento_morador" name="data_nascimento_morador" class="form-control-sm {% if form.data_nascimento_morador.errors %}field-error{% endif %}" type="date"
                                    value="{{ form.instance.data_nascimento_morador|date:'Y-m-d' }}" tabindex="2" required>
                            </div>

                            <div class="input-bottom">
                                <label for="email_morador">Email:</label> <br>
                                <input id="email_morador" name="email_morador" class="form-control-sm {% if form.email_morador.errors %}field-error{% endif %}" 
                                       value="{{ form.instance.email_morador|default_if_none:'' }}" type="text" tabindex="4">
                            </div>
                            
                        </div>
                        
                        <!-- Coluna 2 -->
                        <div id="coluna" class="input-col-md-2">
                            <div id="linha" class="input-row no-gutters">
                                <br>

                                <div class="input-bottom">
                                    <label for="nome_morador">*Nome morador:</label> <br>
                                    <input id="nome_morador" name="nome_morador" class="form-control-sm {% if form.nome_morador.errors %}field-error{% endif %}" type="text" maxlength="60" 
                                        value="{{ form.instance.nome_morador }}" tabindex="1" required autofocus>
                                </div>
                                
                                <div class="input-bottom">
                                    <label for="celular_morador">Celular:</label><br>
                                    <input id="celular_morador" name="celular_morador" class="form-control-sm {% if form.celular_morador.errors %}field-error{% endif %}"
                                           type="text" minlength="11" maxlength="11" 
                                           value="{% if form.instance.celular_morador %}({{ form.instance.celular_morador|slice:':2' }}) {{ form.instance.celular_morador|slice:'2:7' }}-{{ form.instance.celular_morador|slice:'7:' }}{% endif %}"
                                           tabindex="3">
                                </div>
                                

                                <div class="input-bottom">
                                    <label for="parentesco_condomino">*Parentesco c/ condômino:</label> <br>
                                    <select id="parentesco_condomino" name="parentesco_condomino" class="form-control-sm {% if form.parentesco_condomino.errors %}field-error{% endif %}" tabindex="5" required>
                                        <option value="" disabled>Parentesco</option>
                                        <option value="Esposo" {% if form.instance.parentesco_condomino == "Esposo" %}selected{% endif %}>Esposo</option>
                                        <option value="Esposa" {% if form.instance.parentesco_condomino == "Esposa" %}selected{% endif %}>Esposa</option>
                                        <option value="Filho" {% if form.instance.parentesco_condomino == "Filho" %}selected{% endif %}>Filho</option>
                                        <option value="Filha" {% if form.instance.parentesco_condomino == "Filha" %}selected{% endif %}>Filha</option>
                                        <option value="Pai" {% if form.instance.parentesco_condomino == "Pai" %}selected{% endif %}>Pai</option>
                                        <option value="Mãe" {% if form.instance.parentesco_condomino == "Mãe" %}selected{% endif %}>Mãe</option>
                                        <option value="Locatário" {% if form.instance.parentesco_condomino == "Locatário" %}selected{% endif %}>Locatário</option>
                                        <option value="Outros" {% if form.instance.parentesco_condomino == "Outros" %}selected{% endif %}>Outros</option>
                                    </select>
                                </div>
                                

                            </div>
                        </div>
                    </div>
                    <br><br>

                    <button id="btnsalvar" class="btn btn-primary col-2 me-2 btn-block" type="submit">SALVAR</button>
                    
                    
                </form>
            </div>
        </main>

        <script>
            $(document).ready(function() {
                // Aplica máscaras nos campos CPF e celular
                $('#cpf_condomino_display').mask('000.000.000-00');
                $('#cpf_morador').mask('000.000.000-00');
                $('#celular_morador').mask('(00) 00000-0000');
                
                // Seleciona a div onde a mensagem de erro será exibida
                const formErrorsDiv = $('.text-danger');

                // Função para validar o CPF
                function validaCPF(cpf) {
                    cpf = cpf.replace(/\D+/g, '');
                    if (cpf.length !== 11) return false;
                    if (/^(\d)\1+$/.test(cpf)) return false;

                    let soma = 0, resto;
                    for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
                    resto = (soma * 10) % 11;
                    if ((resto === 10) || (resto === 11)) resto = 0;
                    if (resto !== parseInt(cpf.substring(9, 10))) return false;

                    soma = 0;
                    for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
                    resto = (soma * 10) % 11;
                    if ((resto === 10) || (resto === 11)) resto = 0;
                    return resto === parseInt(cpf.substring(10, 11));
                }

                // Função para verificar os campos obrigatórios na sequência
                $('#btnsalvar').click(function(event) {
                    event.preventDefault(); // Impede o envio automático do formulário

                    var campos = [
                        $('#cpf_morador'),
                        $('#nome_morador'),
                        $('#data_nascimento_morador'),
                        $('#parentesco_condomino')
                    ];

                    var valid = true; // Variável para controlar se todos os campos são válidos

                    // Valida os campos obrigatórios na sequência definida
                    for (var i = 0; i < campos.length; i++) {
                        if (!campos[i].val()) {
                            campos[i][0].setCustomValidity("Preencha este campo");
                            campos[i].focus();
                            campos[i].blur(); // Força a exibição da mensagem pop-up
                            campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                            valid = false; // Define como falso se algum campo estiver vazio
                            break; // Para a execução do loop após encontrar o primeiro campo vazio
                        } else {
                            campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                        }
                    }

                    // Se todos os campos obrigatórios forem preenchidos, realiza validações adicionais
                    if (valid) {                        
                        const cpfMoradorInput = document.getElementById('cpf_morador');
                        
                        // Valida os CPFs
                        if (!validaCPF(cpfMoradorInput.value)) {
                            formErrorsDiv.text('CPF Morador inválido.');
                        } else {
                            // Remove caracteres especiais dos campos antes de enviar
                            cpf_condomino.value = cpf_condomino.value.replace(/\D+/g, '');
                            cpf_morador.value = cpfMoradorInput.value.replace(/\D+/g, '');

                            const celularMoradorInput = document.getElementById('celular_morador');
                            celularMoradorInput.value = celularMoradorInput.value.replace(/\D+/g, '');

                            // Envia o formulário após a validação
                            $('form').off('submit').submit();
                        }
                    }

                });
            });

        </script>
        
    </body>
</html>
