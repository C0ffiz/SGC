<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/patrimonio.css">

    <style>
        .input-bottom {
            margin-bottom: 5px;
        }
        input[type="text"], input[type="date"], input[type="password"], input[type="number"], input[type="integer"], select {
            width: 220px;
            height: 30px;
        }
        .container-cols {
            display: flex;
            gap: 20px;
        }
        .input-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 20px;
        }
        .text-danger {
            font-size: 20px;
            height: 30px;
            line-height: 30px;
            margin-bottom: 20px;
            color: rgb(246, 244, 244) !important;
            font-weight: bold;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>   
    <script>
        $(document).ready(function() {
            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio do formulário até a validação ser concluída
                
                // Lista de campos em ordem de consistência
                var campos = [
                    $('#valor_patrimonio'),
                    $('#qtd_patrimonio'),
                    $('#data_disposicao_patrimonio')
                ];
                        
                var valid = true; // Variável para controlar a validade dos campos
    
                // Consistência em ordem definida
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo"); // Define a mensagem de erro personalizada
                        campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                        valid = false; // Se houver algum campo inválido, marca como falso
                        campos[i].focus(); // Foca no campo vazio
                        break; // Interrompe a verificação ao encontrar o primeiro erro
                    } else {
                        campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                    }
                }
    
                // Se todos os campos estiverem válidos
                if (valid) {
                    console.log("Todos os campos preenchidos corretamente.");
    
                    // Remove máscara antes de enviar o formulário
                    var valorPatrimonio = $('#valor_patrimonio').val().replace(/[^\d,-]/g, '');
                    valorPatrimonio = parseFloat(valorPatrimonio.replace(',', '.')); // Substituir a vírgula por ponto para usar como decimal
                    $('#valor_patrimonio').val(valorPatrimonio);
    
                    $('#form-patrimonio').off('submit').submit(); // Permite o envio do formulário
                } else {
                    console.log("Existe um campo obrigatório que não foi preenchido.");
                }
            });

            // Máscara no campo valor_patrimonio
            $('#valor_patrimonio').mask('000.000.000.000.000,00', {reverse: true});
            
            // Verifica se o valor digitado tem mais de 5 dígitos
            function consistirCampo(campoId, maxLength) {
                $('#' + campoId).on('input', function() {
                    var valor = $(this).val();
                    if (valor.length > maxLength) {
                        $(this).val(valor.slice(0, maxLength));
                    }
                });
            }
    
            // Aplica consistência nos campos de quantidade
            consistirCampo('qtd_patrimonio', 5);
        });
    </script>
    
</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'patrimonio_list' %}">CONDOMINIUM</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="titulo">ALTERAÇÃO NO PATRIMÔNIO DO CONDOMÍNIO</h1><br>
        <div class="painel" style="height: 500px;">
            <form id="form-patrimonio" method="POST" novalidate>
                {% csrf_token %}

                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div id="bloco1" class="container-cols d-flex justify-content-center">
                    
                    <!-- Coluna 1 -->
                    <div class="input-col-md-2">
                        <div class="input-top input-bottom">
                            <label for="tipo_patrimonio_id" class="form-label">*Patrimônio:</label><br>
                            <select id="tipo_patrimonio_id" name="tipo_patrimonio_id" class="form-control-sm" disabled>
                                <option value="">Patrimônio</option>
                                {% for tipo in tiposPatrimonio %}
                                    <option value="{{ tipo.pk }}" {% if tipo.pk == patrimonio.tipo_patrimonio_id.pk %}selected{% endif %}>{{ tipo.nome_patrimonio }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="input-bottom">
                            <label for="valor_patrimonio" class="form-label">*Valor (R$):</label><br>
                            <input id="valor_patrimonio" name="valor_patrimonio" class="form-control-sm" type="text" tabindex="1" 
                                value="{{ patrimonio.valor_patrimonio }}" required autofocus>
                        </div> 

                        <div class="input-bottom">
                            <label for="data_disposicao_patrimonio" class="form-label">*Data da alocação:</label><br>
                            <input id="data_disposicao_patrimonio" name="data_disposicao_patrimonio" class="form-control-sm" type="date" tabindex="3" 
                                value="{{ patrimonio.data_disposicao_patrimonio|date:'Y-m-d' }}" required>
                        </div> 
                    </div>
                    
                    <!-- Coluna 2 -->
                    <div class="input-col-md-2">
                        <div class="input-row no-gutters">
                            <div class="input-top input-bottom">
                                <label for="espaco_adm_id" class="form-label">*Espaço :</label><br>
                                <select id="espaco_adm_id" name="espaco_adm_id" class="form-control-sm" disabled>
                                    <option value="">Espaço</option>
                                    {% for espaco in espacos %}
                                        <option value="{{ espaco.pk }}" {% if espaco.pk == patrimonio.espaco_adm_id.pk %}selected{% endif %}>{{ espaco.nome_espaco_adm }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="input-bottom">
                                <label for="qtd_patrimonio" class="form-label">*Qtd:</label><br>
                                <input id="qtd_patrimonio" name="qtd_patrimonio" class="form-control-sm" type="number" min="1" max="99999" 
                                    value="{{ patrimonio.qtd_patrimonio }}" tabindex="2" required>
                            </div>
                        </div>
                    </div>
                </div>
                <br><br>
                
                <button id="btnsalvar" class="btn btn-primary col-2 me-2 btn-block" type="button">SALVAR</button>  
                
                <!-- Campos ocultos para enviar os IDs -->
                <input type="hidden" name="tipo_patrimonio_id" value="{{ patrimonio.tipo_patrimonio_id.pk }}">
                <input type="hidden" name="espaco_adm_id" value="{{ patrimonio.espaco_adm_id.pk }}">
                
            </form>
        </div>
    </main>      
</body>
</html>
