<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/patrimonio.css">

        <style>
            .input-bottom {
                margin-bottom: 5px;
            }
            input[type="text"], input[type="date"], input[type="password"], input[type="number"], input[type="integer"], select {
                width: 220px;
                height: 30px;
            }
            .container-cols {
                display: flex;
                gap: 20px;
            }
            .input-col {
                flex: 1;
                display: flex;
                flex-direction: column;
            }
            .input-col .input-row {
                margin-bottom: 20px;
            }
               /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
            .text-danger {
                font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
                height: 30px; /* Espaço reservado para a mensagem de erro */
                line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
                margin-bottom: 20px; /* Margem inferior */
                color: rgb(246, 244, 244) !important; /* Cor branca */
                font-weight: bold; /* Negrito */
            }

        </style>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>   
        <script>
            $(document).ready(function() {
                // Sequência nos campos para consistência
                $('#btnsalvar').click(function(event) {
                    event.preventDefault(); // Impede o envio automático do formulário
                    
                    // Seleciona os campos que precisam ser verificados
                    var campos = [
                        $('#data_baixa_patrimonio'),
                        $('#qtd_baixada_patrimonio')
                    ];
        
                    var valid = true; // Variável para controlar se todos os campos são válidos
                    
                    // Loop pelos campos para verificar se estão preenchidos
                    for (var i = 0; i < campos.length; i++) {
                        if (!campos[i].val()) {
                            campos[i][0].setCustomValidity("Preencha este campo"); // Define mensagem de erro
                            campos[i][0].reportValidity(); // Exibe a mensagem de erro
                            campos[i].focus(); // Foca no campo vazio
                            valid = false; // Define como falso se algum campo estiver vazio
                            break; // Para a execução do loop após encontrar o primeiro campo vazio
                        } else {
                            campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                        }
                    }
                    
                    // Se todos os campos forem válidos, submete o formulário
                    if (valid) {
                        $('form').off('submit').submit(); // Permite o envio do formulário
                    }
                });
            });
        </script>
        
        
    </head>

    <body>
        <nav class="navbar bg-dark mb-3" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'patrimonio_list' %}">CONDOMINIUM</a>
            </div>
        </nav>

        <main class="container">
            <h1 id="titulo">BAIXA NO PATRIMÔNIO DO CONDOMÍNIO</h1><br>

            <div class="painel p-4" style="height: auto; min-height: 500px;">

                <form method="POST" novalidate>
                    {% csrf_token %}

                    <!-- Exibição das mensagens de erro -->
                    <div class="text-danger">
                        {% if messages %}
                            {% for message in messages %}
                                <div>{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    </div>

                    <!-- Campo Data da Baixa -->
                    <div class="input-bottom">
                        <label for="data_baixa_patrimonio" class="form-label">Data da baixa:</label><br>
                        <input id="data_baixa_patrimonio" name="data_baixa_patrimonio" type="date" class="form-control-sm" tabindex="1" required
                            value="{{ data_baixa_patrimonio|date:'Y-m-d' }}">                        
                    </div>

                    <!-- Campo Quantidade Baixada -->
                    <div class="input-bottom">
                        <label for="qtd_baixada_patrimonio" class="form-label">Qtd baixada:</label><br>
                        <input id="qtd_baixada_patrimonio" name="qtd_baixada_patrimonio" type="number" class="form-control-sm" min="0" max="99999" tabindex="2" required
                            value="{{ qtd_baixada_patrimonio }}">                        
                    </div>
                    <br><br>
                    
                    <button id="btnsalvar" class="btn btn-primary col-2 me-2 btn-block" type="button">SALVAR</button>                  
                    
                </form>
            </div>
        </main>      
    </body>
</html>
