<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/patrimonio.css">

        <style>
            .input-bottom {
                margin-bottom: 5px;
            }
            input[type="text"], input[type="date"], input[type="password"], input[type="number"], input[type="integer"], select {
                width: 220px;
                height: 30px;
            }
            .container-cols {
                display: flex;
                gap: 20px;
            }
            .input-col {
                flex: 1;
                display: flex;
                flex-direction: column;
            }
            .input-col .input-row {
                margin-bottom: 20px;
            }
            /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
            .text-danger {
                font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
                height: 30px; /* Espaço reservado para a mensagem de erro */
                line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
                margin-bottom: 20px; /* Margem inferior */
                color: rgb(246, 244, 244) !important; /* Cor branca */
                font-weight: bold; /* Negrito */
            }
        </style>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>   
        <script>
            $(document).ready(function() {
                $('#form-patrimonio').submit(function(event) {
                    event.preventDefault(); // Impede o envio do formulário até a validação ser concluída
                    
                    // Lista de campos em ordem de consistência
                    var campos = [
                        $('#tipo_patrimonio_id'),
                        $('#espaco_adm_id'),
                        $('#valor_patrimonio'),
                        $('#qtd_patrimonio'),
                        $('#data_disposicao_patrimonio'),
                    ];
                  
                    var valid = true; // Variável para controlar a validade dos campos
        
                    // Consistência em ordem definida
                    for (var i = 0; i < campos.length; i++) {
                        if (!campos[i].val()) {
                            campos[i][0].setCustomValidity("Preencha este campo"); // Define a mensagem de erro personalizada
                            campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                            valid = false; // Se houver algum campo inválido, marca como falso
                            break; // Interrompe a verificação ao encontrar o primeiro erro
                        } else {
                            campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                        }
                    }
        
                    // Se todos os campos estiverem válidos
                    if (valid) {
                        console.log("Todos os campos preenchidos corretamente.");
        
                        // Remove máscara antes de enviar o formulário
                        var valorPatrimonio = $('#valor_patrimonio').val().replace(/[^\d,-]/g, '');
                        valorPatrimonio = parseFloat(valorPatrimonio.replace(',', '.')); // Substituir a vírgula por ponto para usar como decimal
                        $('#valor_patrimonio').val(valorPatrimonio);
        
                        this.submit(); // Envia o formulário
                    } else {
                        console.log("Existe um campo obrigatório que não foi preenchido.");
                    }
                });
            });
        </script>
        
    </head>

    <body>
        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'patrimonio_list' %}">CONDOMINIUM</a>
            </div>
        </nav>

        <main class="container">
            <h1 id="titulo">CADASTRO DE PATRIMÔNIO DO CONDOMÍNIO</h1><br>
            <div class="painel" style="height: 500px;">
                <form method="POST" novalidate id="form-patrimonio">
                    {% csrf_token %}

                    <div class="text-danger" id="form_errors">
                        {% if messages %}
                            {% for message in messages %}
                                <div>{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    </div>

                    <div id="bloco1" class="container-cols d-flex justify-content-center">
                        
                        <!-- Coluna 1 -->
                        <div id="coluna" class="input-col-md-2">

                            <div class="input-top input-bottom">
                                <label for="tipo_patrimonio_id" class="form-label">*Patrimônio:</label><br>
                                <select id="tipo_patrimonio_id" name="tipo_patrimonio_id" class="form-control-sm" tabindex="1" required autofocus>
                                    <option value="">Patrimônio</option>
                                    {% for patrimonio in tiposPatrimonio %}
                                    <option value="{{ patrimonio.tipo_patrimonio_id }}" {% if form_data.tipo_patrimonio_id == patrimonio.tipo_patrimonio_id %}selected{% endif %}>{{ patrimonio.nome_patrimonio }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="input-bottom">
                                <label for="valor_patrimonio" class="form-label">*Valor (R$):</label><br>
                                <input id="valor_patrimonio" name="valor_patrimonio" class="form-control-sm" type="text" tabindex="3" required>
                            </div> 

                            <div class="input-bottom">
                                <label for="data_disposicao_patrimonio" class="form-label">*Data da alocação:</label><br>
                                <input id="data_disposicao_patrimonio" name="data_disposicao_patrimonio" class="form-control-sm" type="date" tabindex="5" required>
                            </div> 

                        </div>
                        
                        <!-- Coluna 2 -->
                        <div id="coluna" class="input-col-md-2">
                            <div id="linha" class="input-row no-gutters">

                                <div class="input-top input-bottom">
                                    <label for="espaco_adm_id" class="form-label">*Espaço :</label><br>
                                    <select id="espaco_adm_id" name="espaco_adm_id" class="form-control-sm" tabindex="2" required>
                                        <option value="">Espaço</option>
                                        {% for espaco in espacos %}
                                        <option value="{{ espaco.espaco_adm_id }}" {% if form_data.espaco_adm_id == espaco.espaco_adm_id %}selected{% endif %}>{{ espaco.nome_espaco_adm }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="input-bottom">
                                    <label for="qtd_patrimonio" class="form-label">*Qtd alocada:</label><br>
                                    <input id="qtd_patrimonio" name="qtd_patrimonio" class="form-control-sm" type="number" min="1" max="99999" tabindex="4" required>
                                </div>

                            </div>
                        </div>
                    </div>

                    <br><br>
                    <div>
                        <button class="btn btn-primary col-2 me-2 btn-block" type="submit">SALVAR</button>                        
                    </div>

                </form>
            </div>
        </main>      

        <!-- Aplicando a máscara de moeda no campo ao carregar a página -->
        <script>
            $(document).ready(function(){
                
                $('#valor_patrimonio').mask('000.000.000.000.000,00', {reverse: true});
                
                // Remover a máscara antes de enviar o formulário
                $('#form-patrimonio').submit(function() {
                    var valorPatrimonio = $('#valor_patrimonio').val().replace(/[^\d,-]/g, '');
                    valorPatrimonio = Decimal(valorPatrimonio.replace(',', '.')); // Substituir a vírgula por ponto para usar como decimal
                    $('#valor_patrimonio').val(valorPatrimonio);
                });
            });
        </script>

        <!-- Verifica se o valor digitado tem mais de 5 dígitos -->
        <script>
            $(document).ready(function() {
                // Função genérica para consistir os campos
                function consistirCampo(campoId, maxLength) {
                    $('#' + campoId).on('input', function() {
                        var valor = $(this).val();
                        if (valor.length > maxLength) {
                            // Se o valor tiver mais que o número máximo de dígitos, corta os extras
                            $(this).val(valor.slice(0, maxLength));
                        }
                    });
                }
        
                // Aplica consistência nos campos de quantidade
                consistirCampo('qtd_patrimonio', 5);
                consistirCampo('qtd_baixada_patrimonio', 5);
            });
        </script>
        
    </body>
</html>
