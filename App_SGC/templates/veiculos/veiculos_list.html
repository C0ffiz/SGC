<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Folhas de Estilo Externas -->
    <link rel="stylesheet" href="/static/node_modules/@fortawesome/fontawesome-free/css/all.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Folhas de Estilo Locais -->
    <link rel="stylesheet" href="/static/css/unidades.css">
    <title>SGC</title>
    <style>
        .container-cols {
            display: flex;
            gap: 0px; /* Espaçamento entre as colunas */
        }
        .input-col {
            flex: 1; /* Cada coluna ocupa o mesmo espaço */
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 20px; /* Espaçamento entre as linhas */
        }
        .form-control-sm {
            /* width: 50%;  */
        }
        input[type="text"], input[type="date"], select {
            width: 220px;
        }
        .close-th {
            padding-right: 10px; /* Ajuste o valor conforme necessário */
        }
        /* altera ambiente do cabeçalho e linha q fica abaixo */
        .auto-layout {
            table-layout: auto; /* Ajusta o layout da tabela conforme o conteúdo */
            margin-left: auto;
            margin-right: auto;
            /* border-collapse: separate; */
            border-spacing: 0px; /* Aumenta a distância entre as colunas */
        }
        /* altera ambiente do botão cadastrar e buscar */
        .box {
            width: 350px;
            height: 32px;
            display: inline-block;
            margin-right: 20px; /* Adiciona margem à direita para separar as divs horizontalmente */
            margin-bottom: 20px; /* Adiciona margem inferior para separar as divs verticalmente */
        }
    </style>
</head>

<body>
    <!-- Barra de Navegação -->
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="home">CONDOMINIUM</a>
        </div>
    </nav>

    <!-- Corpo da Página -->
    <main class="container">
        <h1 id="titulo_list">UNIDADES DO CONDOMÍNIO</h1>

        <!-- Opções de Pesquisa e Cadastro -->
        <div class="container_1">
            <div class="box">
                <a href="{% url 'unidades_create' %}" class="btn btn-primary" id="cadastrar">CADASTRAR UNIDADES</a>
            </div>

            <div class="box" id="divBusca">
                <input type="text" id="txtBusca" placeholder="Unidade" />
                <button id="btnBusca">BUSCAR</button>
            </div>
        </div>

        <!-- Tabela de Unidades -->
        <table id="unidadesTable" class="table auto-layout">
            <thead>
                <tr>
                    <th scope="col" class="close-th">CPF CONDÔMINO</th>
                    <th scope="col" class="close-th">CONDÔMINO</th>
                    <th scope="col" class="close-th">BLOCO</th>
                    <th scope="col" class="close-th">UNIDADE</th>
                </tr>
            </thead>
            <tbody>
                {% for unid in unidades_list %}
                <tr>
                    <td>{{ unid.cpf_condomino.cpf_condomino }}</td>
                    <td>{{ unid.cpf_condomino.nome_condomino }}</td>
                    <td>{{ unid.bloco_id.bloco }}</td>
                    <td>{{ unid.unidade }}</td>
                    <td style="border: none; width:200px">
                        <a href="{% url 'unidades_update' pk=unid.pk %}" class="btn btn-primary btn-sm">ALTERAR</a>
                        <a href="{% url 'unidades_delete' pk=unid.pk %}" class="btn btn-danger btn-sm">EXCLUIR</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>

    <!-- Scripts JavaScript -->
    <script>
        // Função para manipular a pesquisa/filtragem
        function handleSearch() {
            document.getElementById('txtBusca').addEventListener('input', function () {
                var searchText = this.value.toLowerCase();
                var rows = document.querySelectorAll('#unidadesTable tbody tr');

                rows.forEach(function (row) {
                    var unidade = row.querySelector('td').textContent.toLowerCase();
                    // Check if bloco contains the search text
                    if (unidade.includes(searchText)) {
                        row.style.display = '';
                    } else {
                        row.style.display = 'none';
                    }
                });
            });
        }

        // Ouvinte de evento para DOMContentLoaded para chamar as funções necessárias
        document.addEventListener('DOMContentLoaded', function () {
            handleSearch();
        });
    </script>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
