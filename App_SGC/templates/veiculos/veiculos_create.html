<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/veiculos.css">

        <style>
            .container-cols {
                display: flex;
                gap: 20px; /* Espaçamento entre as colunas */
            }
            .input-col {
                flex: 1; /* Cada coluna ocupa o mesmo espaço */
                display: flex;
                flex-direction: column;
            }
            .input-col .input-row {
                margin-bottom: 40px; /* Espaçamento entre as linhas */
            }
            .input-bottom {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 3px; /* Espaçamento entre as linhas */
            }
            input[type="text"], input[type="date"], select.form-control {
                width: 220px;
                height: 30px;
                margin: auto;
            }
            /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
            .text-danger {
                font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
                height: 30px; /* Espaço reservado para a mensagem de erro */
                line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
                margin-bottom: 20px; /* Margem inferior */
                color: rgb(246, 244, 244) !important; /* Cor branca */
                font-weight: bold; /* Negrito */
            } 
        </style>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
        <script>
            $(document).ready(function() {
                // Aplica a máscara ao carregar a página
                $('#cpf_condomino').mask('000.000.000-00');
        
                // Submissão do formulário com remoção da máscara
                $('#form-veiculos').submit(function(event) {
                    event.preventDefault(); // Impede o envio do formulário até a validação ser concluída
        
                    // Lista de campos em ordem de consistência
                    var campos = [
                        $('#cpf_condomino'),
                        $('#placa_veiculo'),
                        $('#marca_veiculo'),
                        $('#modelo_veiculo'),
                        $('#cor_veiculo'),
                    ];
                
                    var valid = true; // Variável para controlar a validade dos campos
        
                    // Consistência em ordem definida
                    for (var i = 0; i < campos.length; i++) {
                        if (!campos[i].val()) {
                            campos[i][0].setCustomValidity("Preencha este campo"); // Define a mensagem de erro personalizada
                            campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                            valid = false; // Se houver algum campo inválido, marca como falso
                            break; // Interrompe a verificação ao encontrar o primeiro erro
                        } else {
                            campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                        }
                    }
        
                    // Se todos os campos estiverem válidos
                    if (valid) {
                        // Remove a máscara do CPF antes de enviar
                        var cpf = $('#cpf_condomino').val().replace(/\D/g, '');
                        $('#cpf_condomino').val(cpf);
        
                        // Converter campos para maiúsculas
                        $('#placa_veiculo').val($('#placa_veiculo').val().toUpperCase());
        
                        this.submit(); // Envia o formulário
                    } else {
                        // Reaplica a máscara no campo CPF se houver erro
                        $('#cpf_condomino').mask('000.000.000-00');
                        console.log("Existe campo obrigatório que não foi preenchido.");
                    }
                });
        
                // Reaplicar a máscara no campo CPF se houver um valor preenchido ao carregar a página
                var cpfInput = $('#cpf_condomino').val();
                if (cpfInput) {
                    $('#cpf_condomino').val(cpfInput).mask('000.000.000-00');
                }
            });
        </script>

    </head>

    <body>

        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'veiculos_list' %}">CONDOMINIUM</a>
            </div>
        </nav>

        <main class="container">
            <h1 id="titulo">CADASTRO DE VEÍCULOS</h1>

            <div class="painel" style="height: 500px;">
                <form method="POST" novalidate id="form-veiculos">
                    {% csrf_token %}

                    <div class="text-danger" id="form_errors">
                        {% if messages %}
                            {% for message in messages %}
                                <div>{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    </div>


                    <div id="bloco1" class="container-cols d-flex justify-content-center">
                        
                        <!-- Coluna 1 -->
                        <div id="coluna" class="input-col-md-2">   
                    
                            <div class="input-bottom">
                                <label for="cpf_condomino" class="form-label">*CPF do Condômino:</label>
                                <input type="text" class="form-control-sm" id="cpf_condomino" name="cpf_condomino" 
                                    tabindex="1" required autofocus>
                            </div>

                            <div class="input-bottom">
                                <label for="marca_veiculo" class="form-label">*Marca:</label>
                                <input type="text" class="form-control-sm" id="marca_veiculo" name="marca_veiculo" tabindex="3" required>
                            </div>

                            <div class="input-bottom">
                                <label for="cor_veiculo" class="form-label">*Cor:</label>
                                <input type="text" class="form-control-sm" id="cor_veiculo" name="cor_veiculo" tabindex="5" required>
                            </div>

                        </div>

                        <!-- Coluna 2 -->
                        <div id="coluna" class="input-col-md-2">
                          
                            <div class="input-bottom">
                                <label for="placa_veiculo" class="form-label">*Placa:</label>
                                <input type="text" class="form-control-sm" id="placa_veiculo" name="placa_veiculo" minlength="7" maxlength="7" tabindex="2" required>
                            </div>

                            <div class="input-bottom">
                                <label for="modelo_veiculo" class="form-label">*Modelo:</label>
                                <input type="text" class="form-control-sm" id="modelo_veiculo" name="modelo_veiculo" tabindex="4" required>
                            </div>

                        </div>

                    </div>
                    <br><br>
                    
                    <button type="submit" class="btn btn-primary" id="btnsalvar">SALVAR</button>
                    
                </form>
            </div>
        </main>
    </body>
</html>
