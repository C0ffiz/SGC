<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/garagens.css">

    <style>
        .container-cols {
            display: flex;
            gap: 20px; /* Espaçamento entre as colunas */
        }
        .input-col {
            flex: 1; /* Cada coluna ocupa o mesmo espaço */
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 60px; /* Espaçamento entre as linhas */
        }
        .input-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px; /* Ajuste o espaçamento entre as linhas */
        }
        input[type="text"], input[type="date"], select.form-control {
            width: 220px;
            margin: auto;
        }
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
            margin-top: 5px; /* Ajuste a margem superior para ficar mais próxima do campo anterior */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#cpf_condomino').mask('000.000.000-00');
            $('#btnsalvar').click(function(event) {
                var cpf = $('#cpf_condomino').val().replace(/\D/g, '');
                $('#cpf_condomino').val(cpf);

                // Converter campos para maiúsculas
                $('#placa_veiculo').val($('#placa_veiculo').val().toUpperCase());
                $('#marca_veiculo').val($('#marca_veiculo').val().toUpperCase());
                $('#modelo_veiculo').val($('#modelo_veiculo').val().toUpperCase());
                $('#cor_veiculo').val($('#cor_veiculo').val().toUpperCase());
            });
        });
    </script>
</head>
<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'garagens_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">ALTERAÇÃO DE GARAGENS</h1>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'garagens_update' garagem.pk %}">
                {% csrf_token %}

                <div class="update-form input-center">
                    <label for="cpf_condomino" class="form-label">CPF do Condômino:</label>
                    <input type="text" class="form-control" id="cpf_condomino" name="cpf_condomino" 
                            value="{{ garagem.cpf_condomino.cpf_condomino }}" required tabindex="1" readonly>
                    {% if form_errors.cpf_condomino %}
                        <div class="text-danger">{{ form_errors.cpf_condomino }}</div>
                    {% endif %}
                </div>

                <div class="update-form input-center">
                    <label for="bloco_id" class="form-label">Bloco:</label>
                    <select class="form-control" id="bloco_id" name="bloco_id" readonly>
                        <option value="">Bloco</option>
                        {% for bloco in blocos %}
                        <option value="{{ bloco.bloco_id }}" {% if bloco.bloco_id == garagem.bloco_id.bloco_id %}selected{% endif %}>{{ bloco.bloco }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="update-form input-center">
                    <label for="n_garagem" class="form-label">Nº Garagem:</label>
                    <input type="text" class="form-control" id="n_garagem" name="n_garagem" 
                    value="{{ garagem.n_garagem }}" required tabindex="3">
                    {% if form_errors.n_garagem %}
                        <div class="text-danger">{{ form_errors.n_garagem }}</div>
                    {% endif %}
                </div> 
                <br><br>            
                <button type="submit" class="btn btn-primary" id="btnsalvar" value="Update">Salvar</button>
            </form>
        </div>
    </main>
</body>
</html>
