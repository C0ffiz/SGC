<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/ocorrencias.css">

    <style>
        .container-cols {
            display: flex;
            gap: 20px; /* Espaçamento entre as colunas */
        }
        .input-col {
            flex: 1; /* Cada coluna ocupa o mesmo espaço */
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 40px; /* Espaçamento entre as linhas */
        }
        .input-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px; /* Espaçamento entre as linhas */
        }
        input[type="text"], input[type="date"], input[type="file"], input[type="time"], select.form-control-sm {
            width: 220px;
            height: 30px;
            margin: auto; 
        }
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

    <script>
            
        $(document).ready(function() {
            // Aplica as máscaras aos campos
            $('#cpf_condomino').mask('000.000.000-00');

            // Função para validar CPF
            function validaCPF(cpf) {
                cpf = cpf.replace(/\D+/g, ''); // Remove caracteres não numéricos
                if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

                let soma = 0, resto;
                for (let i = 1; i <= 9; i++) soma += parseInt(cpf.charAt(i - 1)) * (11 - i);
                resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                if (resto !== parseInt(cpf.charAt(9))) return false;

                soma = 0;
                for (let i = 1; i <= 10; i++) soma += parseInt(cpf.charAt(i - 1)) * (12 - i);
                resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                return resto === parseInt(cpf.charAt(10));
            }

            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário

                const cpfCondominoInput = $('#cpf_condomino');
                const formErrorsDiv = $('#form_errors');

                // Limpa as mensagens de erro
                formErrorsDiv.text('');
                $('.text-danger').text('');

                // Remove a formatação antes de validar o CPF
                const cpfCondominoSemMascara = cpfCondominoInput.val().replace(/\D+/g, '');
            
                // Valida o CPF do morador
                if (!validaCPF(cpfCondominoSemMascara)) {
                    formErrorsDiv.text('CPF inválido.');
                    cpfCondominoInput.focus();
                    return false; // Não envia o formulário
                }

                // Verifica os campos obrigatórios
                var campos = [
                    $('#data_ocorrencia'),
                    $('#hora_ocorrencia'),
                    $('#dsc_ocorrencia')
                ];

                var valid = true; // Variável para controlar se todos os campos são válidos
            
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo");
                        campos[i].focus();
                        campos[i].blur(); // Força a exibição da mensagem pop-up
                        campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                        valid = false; // Define como falso se algum campo estiver vazio
                        break; // Para a execução do loop após encontrar o primeiro campo vazio
                    } else {
                        campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                    }
                }

                // Só envia o formulário se todos os campos estiverem válidos
                if (valid) {
                    // Remove a máscara e submete o formulário
                    $('#cpf_condomino').val(cpfCondominoSemMascara);
                    $('form').off('submit').submit(); // Desvincula o evento de click e envia o formulário
                }
            });
        });

    </script>

</head>

<body>

    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'ocorrencias_list' %}">CONDOMINIUM</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="titulo">ALTERAÇÃO DE OCORRÊNCIAS</h1>

        <div class="painel" style="height: 500px;">
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}      
                
                <div id="form_errors" class="text-danger">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>            

                <div class="container-cols d-flex justify-content-center">
                
                    <!-- Coluna 1 -->
                    <div id="coluna1" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="cpf_condomino" class="form-label">*CPF do Condômino:</label>
                            <input type="text" class="form-control-sm" id="cpf_condomino" name="cpf_condomino"
                                value="{{ ocorrencia.cpf_condomino.cpf_condomino }}" readonly>
                        </div>

                        <div class="input-bottom">
                            <label for="hora_ocorrencia" class="form-label">*Hora ocorrência:</label>
                            <input type="time" class="form-control-sm" id="hora_ocorrencia" name="hora_ocorrencia" tabindex="2" 
                                value="{{ ocorrencia.hora_ocorrencia|time:'H:i' }}" required>
                        </div>

                        <div class="input-bottom"> 
                            <label for="documento_ocorrencia" class="form-label">Documento:</label>
                            <div style="position: relative; display: inline-block; width: 100%;">
                        
                                <!-- Campo de upload de arquivo -->
                                <input type="file" id="documento_ocorrencia" name="documento_ocorrencia" style="width: 100%; height: 30px; opacity: 0; position: absolute; left: 0; top: 0; cursor: pointer;" onchange="updateFileName()">
                        
                                <!-- Placeholder visível com texto alinhado à esquerda -->
                                <input type="text" id="placeholder" value="Escolher arquivo" tabindex="4" style="width: 100%; height: 30px; line-height: 30px; background-color: #f0f0f0; border: 1px solid #ccc; cursor: pointer; text-align: left; padding-left: 10px;">
                        
                                <!-- Link para baixar o documento -->
                                {% if ocorrencia.documento_ocorrencia %}
                                    <a href="{{ ocorrencia.documento_ocorrencia.url }}" target="_blank" 
                                        style="position: absolute; top: 50%; right: 10px; transform: translateY(-50%); font-size: 12px; color: blue;">
                                        Baixar docum
                                    </a>
                                {% endif %}
                            </div>                                                   
                        </div> 

                    </div>

                    <!-- Coluna 2 -->
                    <div id="coluna2" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="data_ocorrencia" class="form-label">*Data ocorrência:</label>
                            <input type="date" class="form-control-sm" id="data_ocorrencia" name="data_ocorrencia" tabindex="1" 
                                value="{{ ocorrencia.data_ocorrencia|date:'Y-m-d' }}" required autofocus>
                        </div>

                        <div class="input-bottom">
                            <label for="dsc_ocorrencia" class="form-label">*Descrição:</label>
                            <input type="text" class="form-control-sm" id="dsc_ocorrencia" name="dsc_ocorrencia" maxlength="60" tabindex="3" 
                                value="{{ ocorrencia.dsc_ocorrencia }}" required>
                        </div>

                    </div>                   
                </div><br><br><br>                
                <button type="submit" class="btn btn-primary" id="btnsalvar" value="Update">SALVAR</button>
            </form>
            <script>
                $('#review-image').change(function(e) {
                    let fileName = (e.target.files.length > 0) ? e.target.files[0].name : 'choose_file_not';
                    $('#review-image-label').text(fileName);
                });
            </script>
        </div>
    </main>
</body>
</html>
