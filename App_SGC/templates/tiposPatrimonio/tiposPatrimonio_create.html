<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/tiposPatrimonio.css">
        <style>
            .input-bottom {
                margin-bottom: 5px;
            }
            input[type="text"], input[type="date"], input[type="password"], input[type="number"], select {
                width: 220px;
                height: 30px;
            }
            .container-cols {
                display: flex;
                gap: 20px;
            }
            .input-col {
                flex: 1;
                display: flex;
                flex-direction: column;
            }
            .input-col .input-row {
                margin-bottom: 20px;
            }
            /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
            .text-danger {
                font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
                height: 30px; /* Espaço reservado para a mensagem de erro */
                line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
                margin-bottom: 20px; /* Margem inferior */
                color: rgb(246, 244, 244) !important; /* Cor branca */
                font-weight: bold; /* Negrito */
            }
        </style>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>   
        <script>
            $(document).ready(function() {
                $('#form-tipoPatrimonio').submit(function(event) {
                    event.preventDefault(); // Impede o envio do formulário até a validação ser concluída
                    
                    // Lista de campos em ordem de consistência
                    var campos = [
                        $('#nome_patrimonio'),
                        $('#cor_patrimonio'),
                        $('#descricao_patrimonio'),
                    ];

                    var valid = true; // Variável para controlar a validade dos campos

                    // Consistência em ordem definida
                    for (var i = 0; i < campos.length; i++) {
                        if (!campos[i].val()) {
                            campos[i][0].setCustomValidity("Preencha este campo"); // Define a mensagem de erro personalizada
                            campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                            valid = false; // Se houver algum campo inválido, marca como falso
                            break; // Interrompe a verificação ao encontrar o primeiro erro
                        } else {
                            campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                        }
                    }

                    if (valid) {
                        // Se todos os campos forem válidos, envie o formulário
                        this.submit(); // Agora permite o envio
                    }
                });
            });

        </script>
        
    </head>

    <body>
        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'tiposPatrimonio_list' %}">CONDOMINIUM</a>
            </div>
        </nav>

        <main class="container">
            <h1 id="titulo">CADASTRO TIPOS DE PATRIMÔNIO</h1>
            <div class="painel" style="height: 500px;">
                <form method="POST" novalidate id="form-tipoPatrimonio">
                    {% csrf_token %}

                    <div class="text-danger" id="form_errors">
                        {% if messages %}
                            {% for message in messages %}
                                <div>{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    </div>

                    <div id="bloco1" class="container-cols d-flex justify-content-center">
                        
                        <!-- Coluna 1 -->
                        <div id="coluna" class="input-col-md-2">

                            <div class="input-bottom">
                                <label for="nome_patrimonio" class="form-label">*Nome Patrimônio:</label> <br>
                                <input id="nome_patrimonio" name="nome_patrimonio" class="form-control-sm {% if form.nome_patrimonio.errors %}field-error{% endif %}" type="text" maxlength="40" tabindex="1" required autofocos>
                            </div>  
                            
                            <div class="input-bottom">
                                <label for="cor_patrimonio" class="form-label">*Cor:</label> <br>
                                <input id="cor_patrimonio" name="cor_patrimonio" class="form-control-sm {% if form.n_patrimonio.errors %}field-error{% endif %}" type="text" maxlength="20" tabindex="3" required>
                            </div>  
                            
                        </div>
                        
                        <!-- Coluna 2 -->
                        <div id="coluna" class="input-col-md-2">
                            <div id="linha" class="input-row no-gutters">

                                <div class="input-bottom">
                                    <label for="n_patrimonio" class="form-label">Número:</label> <br>
                                    <input id="n_patrimonio" name="n_patrimonio" class="form-control-sm {% if form.n_patrimonio.errors %}field-error{% endif %}" type="text" maxlength="20" tabindex="2">
                                </div>

                                <div class="input-bottom">
                                    <label for="descricao_patrimonio" class="form-label">*Dsc:</label> <br>
                                    <input id="descricao_patrimonio" name="descricao_patrimonio" class="form-control-sm {% if form.descricao_patrimonio.errors %}field-error{% endif %}" type="text" maxlength="60" tabindex="4" required>
                                </div>                               
                                                        
                            </div>
                        </div>
                    </div>

                    <br><br>
                    <div>
                        <button class="btn btn-primary col-2 me-2 btn-block" type="submit">SALVAR</button>                        
                    </div>

                </form>
            </div>
        </main>      
    </body>
</html>
