<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/beneficios.css">
    <style>
        .container-cols {
            display: flex;
            gap: 20px; /* Espaçamento entre as colunas */
        }
        .input-col {
            flex: 1; /* Cada coluna ocupa o mesmo espaço */
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 80px; /* Espaçamento entre as linhas */
        }
        .form-control-sm {
            /* width: 50%;  */
        }
        input[type="text"], input[type="date"], select {
            width: 220px;
            height: 30px;
        }   
        .input-bottom {
            margin-bottom: 40px; /* Aumenta a distância entre as divs verticalmente */
            margin-right: 20px; /* Aumenta a distância entre as divs horizontalmente */
        }    
    </style>
</head>

<body>

    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'beneficios_list' %}">CONDOMINIUM</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="titulo">CADASTRO DE BENEFÍCIOS</h1><br>

        <div class="painel" style="height: 500px;">

            <form method="POST">
                {% csrf_token %}
                <div>
                    {% if form.errors %}
                    <div class="alert alert-danger error-duplicate" role="alert">
                        <ul>
                            {% for field, errors in form.errors.items %}
                            {% for error in errors %}
                            <li><strong>{{ field }}:</strong> {{ error }}</li>
                            {% endfor %}
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}
                </div>

                <div class="input-bottom">
                    <label for="nome_beneficio">Benefício:</label> <br>
                    <input id="nome_beneficio" name="nome_beneficio" class="form-control-sm" type="text" minlength="1"
                        maxlength="50" autofocus> <br>
                </div>  

                <div class="input-top input-bottom">
                    <label for="n_condominio">Condomínio:</label><br>
                    <select id="n_condominio" name="n_condominio" class="form-control-sm">
                        <option value="">Condomínio</option>
                        {% for condominio in condominios %}
                        <option value="{{ condominio.n_condominio }}">{{ condominio.nome_condominio }}</option>
                        {% endfor %}
                    </select>
                </div>
                            
                <br><br>
                <button id="btnsalvar" type="submit">SALVAR</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
    </script>
</body>

</html>
