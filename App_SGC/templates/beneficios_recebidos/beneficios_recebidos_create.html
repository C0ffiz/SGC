<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/beneficios_recebidos.css">
        <style>
            .container-cols {
                display: flex;
                gap: 20px; /* Espaçamento entre as colunas */
            }
            .input-col {
                flex: 1; /* Cada coluna ocupa o mesmo espaço */
                display: flex;
                flex-direction: column;
            }
            .input-col .input-row {
                margin-bottom: 40px; /* Espaçamento entre as linhas */
            }
            .input-bottom {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 20px; /* Espaçamento entre as linhas */
            }
            input[type="text"], input[type="date"], select.form-control-sm {
                width: 220px;
                height: 30px;
                margin: auto;
            }
            #btnsalvar {
                display: block;
                margin: auto;
                width: 140px;
            }
        </style>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
        <script>
            $(document).ready(function(){
                $('#cpf_colaborador').mask('000.000.000-00');
                $('#btnsalvar').click(function(event) {
                    var cpf = $('#cpf_colaborador').val().replace(/\D/g, '');
                $('#cpf_colaborador').val(cpf);
                });
            });
        </script>
    </head>
    <body>
        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'beneficios_recebidos_list' %}">CONDOMINIUM</a>
            </div>
        </nav>
        <main class="container">
            <h1 id="titulo">CADASTRO DE BENEFÍCIOS</h1><br>

            <div class="painel" style="height: 500px;">
                <form id="beneficiosRecebidosForm" method="post">
                    {% csrf_token %}
                    <div class="input-bottom">
                        <label class="form-label" for="cpf_colaborador">CPF do Colaborador:</label>
                        <input type="text" class="form-control" id="cpf_colaborador" name="cpf_colaborador" required tabindex="1" autofocus>
                        {% if form_errors.cpf_colaborador %}
                            <div class="text-danger">{{ form_errors.cpf_colaborador }}</div>
                        {% endif %}
                    </div>

                    <div class="input-bottom">
                        <label class="form-label" for="beneficio_id">Benefício:</label>
                        <select id="beneficio_id" name="beneficio_id" class="form-control-sm {% if form.n_condominio.errors %}field-error{% endif %}" tabindex="2" required>
                            <option value="">Benefício</option>
                            {% for beneficio in beneficios %}
                                <option value="{{ beneficio.beneficio_id }}">{{ beneficio.nome_beneficio }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input-bottom">
                        <label class="form-label" for="n_condominio">Condomínio:</label>
                        <select id="n_condominio" name="n_condominio" class="form-control-sm {% if form.n_condominio.errors %}field-error{% endif %}" tabindex="8">
                            <option value="">Condomínio</option>
                            {% for condominio in condominios %}
                                <option value="{{ condominio.n_condominio }}">{{ condominio.nome_condominio }}</option>
                            {% endfor %}
                        </select>
                    </div> 
                    <br><br>
                    
                    <button id="btnsalvar" type="submit">SALVAR</button>
                </form>
            </div>
        </main>
    </body>
</html>
