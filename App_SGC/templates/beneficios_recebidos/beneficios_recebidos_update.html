<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/beneficios_recebidos.css">
    <style>
        .container-cols {
            display: flex;
            gap: 20px; /* Espaçamento entre as colunas */
        }
        .input-col {
            flex: 1; /* Cada coluna ocupa o mesmo espaço */
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 80px; /* Espaçamento entre as linhas */
        }
        .input-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px; /* Espaçamento entre as linhas */
        }
        input[type="text"], input[type="date"], select.form-control {
            width: 220px;
            margin: auto;
        }
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#cpf_colaborador').mask('000.000.000-00');
            $('#btnsalvar').click(function(event) {
                 var cpf = $('#cpf_colaborador').val().replace(/\D/g, '');
            $('#cpf_colaborador').val(cpf);
            });
        });
    </script>
</head>
<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'beneficios_recebidos_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">ALTERAÇÃO DE BENEFÍCIOS</h1><br>

        <div class="painel" style="height: 500px;">
            <form id="beneficiosRecebidosForm" method="post">
                {% csrf_token %}
                <div class="update-form input-center">
                    <label for="cpf_colaborador" class="form-label">CPF do Colaborador:</label>
                    <input type="text" class="form-control" id="cpf_colaborador" name="cpf_colaborador" 
                        value="{{ beneficio_recebido.cpf_colaborador.cpf_colaborador }}" readonly>
                    {% if form_errors.cpf_colaborador %}
                        <div class="text-danger">{{ form_errors.cpf_colaborador }}</div>
                    {% endif %}
                </div>

                <div class="update-form input-center">
                    <label for="beneficio_id" class="form-label">Benefício:</label>
                    <select class="form-control" id="beneficio_id" name="beneficio_id" tabindex="1" required 
                        value="{{ beneficio_recebido.beneficio_id.beneficio_id }}" autofocus>
                        <option value="">Benefício</option>
                        {% for beneficio in beneficios %}
                            <option value="{{ beneficio.beneficio_id }}">{{ beneficio.nome_beneficio }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="update-form input-center">
                    <label for="n_condominio">Condomínio:</label><br>
                    <select id="n_condominio" name="n_condominio" class="form-control-sm {% if form.n_condominio.errors %}field-error{% endif %}" 
                        value="{{ beneficio_recebido.n_condominio.n_condominio }}"tabindex="2">
                        <option value="">Condomínio</option>
                        {% for condominio in condominios %}
                            <option value="{{ condominio.n_condominio }}">{{ condominio.n_condominio }} - {{ condominio.nome_condominio }}</option>
                        {% endfor %}
                    </select>
                    {% if form.n_condominio.errors %}
                        <div class="text-danger"></div>
                    {% endif %}
                </div>
                <br><br>
                
                <button type="submit" class="btn btn-primary" id="btnsalvar" value="Update">Salvar</button>

                {% if form_errors %}
                    <div class="text-danger text-center mt-3">
                        {% for field, error in form_errors.items %}
                            {{ error }}<br>
                        {% endfor %}
                    </div>
                {% endif %}
            </form>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
    </script>
</body>
</html>
