<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <link rel="stylesheet" href="/static/node_modules/@fortawesome/fontawesome-free/css/all.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/colaboradores.css">
        
        <style>
            .container-cols {
                display: flex;
                gap: 20px; /* Espaçamento entre as colunas */
            }
            .input-col {
                flex: 1; /* Cada coluna ocupa o mesmo espaço *
                display: flex;
                flex-direction: column;
            }
            .input-col .input-row {
                margin-bottom: 20px; /* Espaçamento entre as linhas */
            }
            .form-control-sm {
                /* width: 50%;  */
            }
            input[type="text"], input[type="tel"], input[type="email"], input[type="date"], select {
                width: 220px;
                height: 30px;
            }
            /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
            .text-danger {
                font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
                height: 30px; /* Espaço reservado para a mensagem de erro */
                line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
                margin-bottom: 20px; /* Margem inferior */
                color: rgb(246, 244, 244) !important; /* Cor branca */
                font-weight: bold; /* Negrito */
            }
        </style>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
        <script>
            $(document).ready(function() {
                // Aplica as máscaras nos campos ao digitar
                $('#cpf_colaborador').mask('000.000.000-00');
                $('#telefone_colaborador').mask('(00) 0000-0000');
                $('#celular_colaborador').mask('(00) 00000-0000');
                $('#celular_contato_colaborador').mask('(00) 00000-0000');
        
                // Ao clicar no botão salvar
                $('#btnsalvar').click(function(event) {
                    event.preventDefault(); // Impede o envio automático do formulário
        
                    // Remove a máscara dos campos para validação
                    var cpf = $('#cpf_colaborador').val().replace(/\D/g, '');
                    var telefone = $('#telefone_colaborador').val().replace(/\D/g, '');
                    var celular = $('#celular_colaborador').val().replace(/\D/g, '');
                    var celularContato = $('#celular_contato_colaborador').val().replace(/\D/g, '');
        
                    // Valida CPF
                    if (!validaCPF(cpf)) {
                        $('.text-danger').html('CPF inválido');
                        return; // Interrompe o processo se o CPF for inválido
                    } else {
                        $('.text-danger').html(''); // Limpa a mensagem de erro se o CPF for válido
                    }
        
                    var campos = [
                        $('#cpf_colaborador'),
                        $('#nome_colaborador'), // Corrigido: Adicionado #
                        $('#data_nascimento_colaborador'),
                        $('#endereco_colaborador'),
                        $('#celular_colaborador'),
                        $('#email_colaborador'), // Corrigido: Adicionado #
                        $('#nome_contato_colaborador'),
                        $('#celular_contato_colaborador')
                    ];
                    
                    var valid = true; // Variável para controlar se todos os campos são válidos
                    
                    for (var i = 0; i < campos.length; i++) {
                        if (!campos[i].val()) {
                            campos[i][0].setCustomValidity("Preencha este campo");
                            campos[i].focus();
                            campos[i].blur(); // Força a exibição da mensagem pop-up
                            campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                            valid = false; // Define como falso se algum campo estiver vazio
                            break; // Para a execução do loop após encontrar o primeiro campo vazio
                        } else {
                            campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                        }
                    }
        
                    // Submete o formulário se tudo estiver válido
                    if (valid) {
                        $('form').off('submit').submit();
                    }
                });
            });
        
            // Função para validar CPF
            function validaCPF(cpf) {
                cpf = cpf.replace(/\D+/g, '');
                if (cpf.length !== 11) return false;
                if (/^(\d)\1+$/.test(cpf)) return false;
                let soma = 0, resto;
                for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
                resto = (soma * 10) % 11;
                if ((resto === 10) || (resto === 11)) resto = 0;
                if (resto !== parseInt(cpf.substring(9, 10))) return false;
                soma = 0;
                for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
                resto = (soma * 10) % 11;
                if ((resto === 10) || (resto === 11)) resto = 0;
                return resto === parseInt(cpf.substring(10, 11));
            }
        </script>
        
    </head>

    <body>
        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'colaboradores_list' %}">CONDOMINIUM</a>
            </div>
        </nav>

        <main class="container">
            <h1 id="titulo">ALTERAÇÃO DE COLABORADORES</h1> <br>
            <form method="POST">
                {% csrf_token %}

                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="container-cols d-flex justify-content-center">

                    <!-- Coluna 1 -->
                    <div id="coluna1" class="input-col-md-2">
                        <div class="input-row">
                            <div class="input-bottom">
                                <label for="cpf_colaborador">*CPF:</label><br>
                                <input id="cpf_colaborador" name="cpf_colaborador" class="form-control-sm" type="text" minlength="11" maxlength="11" 
                                    value="{{ colaborador.cpf_colaborador }}" tabindex="1" readonly>
                            </div>
                
                            <div class="input-top input-bottom">
                                <label for="endereco_colaborador">*Endereço:</label><br>
                                <input id="endereco_colaborador" name="endereco_colaborador" class="form-control-sm" type="text" maxlength="70" 
                                    value="{{ colaborador.endereco_colaborador }}" tabindex="3" required>
                            </div>
                
                            <div class="input-top input-bottom">
                                <label for="email_colaborador">*Email:</label><br>
                                <input id="email_colaborador" name="email_colaborador" class="form-control-sm" type="email" maxlength="40" 
                                    value="{{ colaborador.email_colaborador }}" tabindex="7" required>
                            </div>  
                        </div>
                    </div>
                
                    <!-- Coluna 2 -->
                    <div id="coluna2" class="input-col-md-2">
                        <div class="input-row">
                            <div class="input-bottom">
                                <label for="nome_colaborador">*Nome:</label><br>
                                <input id="nome_colaborador" name="nome_colaborador" class="form-control-sm" type="text" minlength="1" maxlength="40" 
                                    value="{{ colaborador.nome_colaborador }}" tabindex="1" required  autofocus>
                            </div>
                
                            <div class="input-top input-bottom">
                                <label for="telefone_colaborador">Telefone:</label><br>
                                <input id="telefone_colaborador" name="telefone_colaborador" class="form-control-sm" type="tel" maxlength="9" 
                                    value="{{ colaborador.telefone_colaborador }}" tabindex="4">
                            </div>
                
                            <div class="input-bottom">
                                <label for="nome_contato_colaborador">*Nome Contato:</label><br>
                                <input id="nome_contato_colaborador" name="nome_contato_colaborador" class="form-control-sm" type="text" minlength="1" maxlength="40" 
                                    value="{{ colaborador.nome_contato_colaborador }}" tabindex="7" required>
                            </div>                         
                        </div>
                    </div>
                
                    <!-- Coluna 3 -->
                    <div id="coluna3" class="input-col-md-2">
                        <div class="input-row">
                            <div class="input-top input-bottom">
                                <label for="data_nascimento_colaborador">*Data Nascimento:</label><br>
                                <input id="data_nascimento_colaborador" name="data_nascimento_colaborador" class="form-control-sm" type="date" 
                                    value="{{ colaborador.data_nascimento_colaborador|date:'Y-m-d' }}" tabindex="2" required>
                            </div>
                
                            <div class="input-top input-bottom">
                                <label for="celular_colaborador">*Celular:</label><br>
                                <input id="celular_colaborador" name="celular_colaborador" class="form-control-sm" type="tel" minlength="9" maxlength="11" 
                                    value="{{ colaborador.celular_colaborador }}" tabindex="5" required>
                            </div>
                            
                            <div class="input-top input-bottom">
                                <label for="celular_contato_colaborador">*Celular Contato:</label><br>
                                <input id="celular_contato_colaborador" name="celular_contato_colaborador" class="form-control-sm" type="tel" minlength="9" maxlength="11" 
                                    value="{{ colaborador.celular_contato_colaborador }}" tabindex="8" required>
                            </div>                       
                        </div>
                    </div>
                
                </div>
                
                <br><br>
                <button id="btnsalvar" type="submit" value="Update">SALVAR</button>
            </form>

        </main>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
