<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>SGC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/colaboradores.css">     
  </head>

  <body>

        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'colaboradores_list' %}">CONDOMINIUM</a>
            </div>
        </nav>
    
        <main class="container">
            <h1 id="titulo">EXCLUSÃO DE COLABORADORES</h1>
            <br><br><br>
            <p>Deseja realmente excluir o colaborador?</p><br>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-sm me-2 btn-excluir">EXCLUIR</button>
                <a href="{% url 'colaboradores_list' %}" class="btn btn-primary btn-sm btn-cancelar">CANCELAR</a>
            </form>  
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
                integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
        </script>
  </body>
</html>
