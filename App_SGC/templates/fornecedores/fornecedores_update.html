<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/fornecedores.css">

    <style>
        /* Espaçamento entre as colunas */
        .container-cols {
            display: flex;
            gap: 20px; 
        }
        /* Cada coluna ocupa o mesmo espaço */
        .input-col {
            flex: 1; 
            display: flex;
            flex-direction: column;
        }
        /* Espaçamento entre as linhas */
        .input-bottom {
            margin-bottom: 10px; 
        }
        /* Espaçamento entre o label e o input */
        .input-bottom label {           
            margin-bottom: 5px; 
        }
        /* Define o tamanho dos campos input */
        input[type="text"], input[type="date"], input[type="time"], select.form-control-sm {
            width: 220px;
            height: 30px;
            margin: auto;
        }
        /* Define o tamanho do botão salvar */
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function() {
            // Aplica as máscaras aos campos            
            $('#cnpj').mask('00.000.000/0000-00');
            $('#cpf_fornecedor').mask('000.000.000-00');
            $('#telefone').mask('(00) 0000-0000');
            $('#celular').mask('(00) 00000-0000');
    
            // Função para remover a formatação dos campos (CNPJ, Telefone, Celular)
            function removeMascara(valor) {
                return valor.replace(/\D+/g, ''); // Remove todos os caracteres que não são números
            }
    
            // Função para validar CNPJ
            function validaCNPJ(cnpj) {
                cnpj = removeMascara(cnpj); // Remove caracteres não numéricos
                if (cnpj.length !== 14) return false; // Verifica o tamanho
    
                // Elimina CNPJs inválidos conhecidos
                if (/^(\d)\1+$/.test(cnpj)) return false;
    
                let tamanho = cnpj.length - 2;
                let numeros = cnpj.substring(0, tamanho);
                let digitos = cnpj.substring(tamanho);
                let soma = 0;
                let pos = tamanho - 7;
                
                // Cálculo do primeiro dígito
                for (let i = tamanho; i >= 1; i--) {
                    soma += numeros.charAt(tamanho - i) * pos--;
                    if (pos < 2) pos = 9;
                }
                let resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
                if (resultado != digitos.charAt(0)) return false;
    
                // Cálculo do segundo dígito
                tamanho = tamanho + 1;
                numeros = cnpj.substring(0, tamanho);
                soma = 0;
                pos = tamanho - 7;
                for (let i = tamanho; i >= 1; i--) {
                    soma += numeros.charAt(tamanho - i) * pos--;
                    if (pos < 2) pos = 9;
                }
                resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
                return (resultado == digitos.charAt(1));
            }
    
            // Função para validar CPF
            function validaCPF(cpf) {
                cpf = removeMascara(cpf); // Remove caracteres não numéricos
                if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
    
                let soma = 0, resto;
                for (let i = 1; i <= 9; i++) soma += parseInt(cpf.charAt(i - 1)) * (11 - i);
                resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                if (resto !== parseInt(cpf.charAt(9))) return false;
    
                soma = 0;
                for (let i = 1; i <= 10; i++) soma += parseInt(cpf.charAt(i - 1)) * (12 - i);
                resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                return resto === parseInt(cpf.charAt(10));
            }
    
            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário
    
                const cpfFornecedorInput = $('#cpf_fornecedor');
                const cnpjInput = $('#cnpj');
                const formErrorsDiv = $('#form_errors');
    
                // Limpa as mensagens de erro
                formErrorsDiv.text('');
                $('.text-danger').text('');
    
                // Remove a formatação antes de validar o CPF e CNPJ
                const cpfFornecedorSemMascara = removeMascara(cpfFornecedorInput.val());
                const cnpjSemMascara = removeMascara(cnpjInput.val());
    
                // Valida o CNPJ
                if (!validaCNPJ(cnpjSemMascara)) {
                    formErrorsDiv.text('CNPJ inválido.');
                    cnpjInput.focus();
                    return false; // Não envia o formulário
                }

                // Valida o CPF
                if (!validaCPF(cpfFornecedorSemMascara)) {
                    formErrorsDiv.text('CPF inválido.');
                    cpfFornecedorInput.focus();
                    return false; // Não envia o formulário
                }  
    
                // Remove a máscara de CNPJ, Telefone e Celular antes do envio
                $('#cnpj').val(cnpjSemMascara);
                $('#telefone').val(removeMascara($('#telefone').val()));
                $('#celular').val(removeMascara($('#celular').val()));
    
                // Verifica os campos obrigatórios
                var campos = [
                    $('#razaoSocial'),
                    $('#nomeFantasia'),
                    $('#cpf_fornecedor'),
                    $('#endereco')
                ];
    
                var valid = true; // Variável para controlar se todos os campos são válidos
    
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo");
                        campos[i].focus();
                        campos[i].blur(); // Força a exibição da mensagem pop-up
                        campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                        valid = false; // Define como falso se algum campo estiver vazio
                        break; // Para a execução do loop após encontrar o primeiro campo vazio
                    } else {
                        campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                    }
                }
    
                // Só envia o formulário se todos os campos estiverem válidos
                if (valid) {
                    // Remove a máscara e submete o formulário
                    $('#cpf_fornecedor').val(cpfFornecedorSemMascara);
                    $('form').off('submit').submit(); // Desvincula o evento de click e envia o formulário
                }
            });
        });
    </script>
    
    
</head>
<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'fornecedores_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">ALTERAÇÃO DE FORNECEDORES</h1><br>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'fornecedores_update' fornecedor.pk %}">
                {% csrf_token %}

                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="container-cols d-flex justify-content-center">
                
                    <!-- Coluna 1 -->
                    <div id="coluna1" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="cnpj" class="form-label">CNPJ:</label><br>
                            <input type="text" class="form-control-sm" id="cnpj" name="cnpj" value="{{ fornecedor.cnpj }}" readonly>
                        </div>

                        <div class="input-bottom">
                            <label for="cpf_fornecedor" class="form-label">*CPF fornecedor:</label><br>
                            <input type="text" class="form-control-sm" id="cpf_fornecedor" name="cpf_fornecedor" value="{{ fornecedor.cpf_fornecedor }}" readonly>
                        </div>

                        <div class="input-bottom">
                            <label for="celular" class="form-label">Celular:</label><br>
                            <input type="text" class="form-control-sm" id="celular" name="celular" minlength="11" maxlength="11" tabindex="3" value="{{ fornecedor.celular }}">
                        </div>

                    </div>

                    <!-- Coluna 2 -->
                    <div id="coluna2" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="razaoSocial" class="form-label">*Razão social:</label><br>
                            <input type="text" class="form-control-sm" id="razaoSocial" name="razaoSocial" maxlength="40" value="{{ fornecedor.razaoSocial }}" readonly>
                        </div>

                        <div class="input-bottom">
                            <label for="endereco" class="form-label">*Endereço:</label><br>
                            <input type="text" class="form-control-sm" id="endereco" name="endereco" maxlength="40" tabindex="1" 
                                value="{{ fornecedor.endereco }}" required autofocus>
                        </div>

                        <div class="input-bottom">
                            <label for="email" class="form-label">E-Mail:</label><br>
                            <input type="text" class="form-control-sm" id="email" name="email" maxlength="40" 
                                oninput="this.value = this.value.toLowerCase()" tabindex="3" value="{{ fornecedor.email }}">
                        </div>

                    </div>

                     <!-- Coluna 3 -->
                    <div id="coluna3" class="input-col-md-2">

                        <div class="input-bottom">
                            <label for="nomeFantasia" class="form-label">*Nome de fantasia:</label><br>
                            <input type="text" class="form-control-sm" id="nomeFantasia" name="nomeFantasia" maxlength="40" value="{{ fornecedor.nomeFantasia }}" readonly>
                        </div>  

                        <div class="input-bottom">
                            <label for="telefone" class="form-label">Telefone:</label><br>
                            <input type="text" class="form-control-sm" id="telefone" name="telefone" minlength="10" maxlength="10" tabindex="2" value="{{ fornecedor.telefone }}">
                        </div>  

                    </div>

                </div>
                <br><br>

                <button type="submit" class="btn btn-primary" id="btnsalvar" value="Update">SALVAR</button>
            </form>
        </div>
    </main>
</body>
</html>
