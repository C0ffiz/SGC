<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/usuarios.css">
    <style>   
        .input-bottom {
            margin-bottom: 10px; /* Espaçamento entre as linhas */
        }
     
        input[type="text"], input[type="date"], input[type="password"],  input[type="number"], select {
            width: 220px;  
            height: 30px;        
        }

        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
       
</head>

<body>

    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'usuarios_list' %}">CONDOMINIUM</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="titulo">CADASTRO DE USUÁRIOS</h1>

        <div class="painel" style="height: 500px;">

            <form method="POST">
                {% csrf_token %}
                
                <div class="text-danger" id="form_errors">
                    {% for message in messages %}
                        <div>{{ message }}</div>
                    {% endfor %}
                </div>                

                <div class="input-bottom">
                    <label for="username">*Usuário:</label> <br>
                    <input id="username" name="username" autofocos class="form-control-sm" type="text" minlength="3"
                        maxlength="30" tabindex="1" required autofocus> <br>
                </div>

                <div class="input-bottom">
                    <label for="password">*Senha:</label> <br>
                    <input id="password" name="password" class="form-control-sm" type="password" minlength="3"
                        maxlength="15" tabindex="2" required> <br>
                </div>

                <div class="input-bottom">
                    <label for="cpf_usuario">*CPF Usuário:</label> <br>
                    <input id="cpf_usuario" name="cpf_usuario" class="form-control-sm" type="text" minlength="14"
                        maxlength="14" tabindex="3" required> <br>
                </div>

                <div class="input-bottom">
                    <label for="n_condominio">*Condomínio:</label> <br>
                    <select id="n_condominio" name="n_condominio" class="form-control-sm" tabindex="5" required>
                        <option value="">Condomínio</option>
                        {% for condominio in condominios %}
                        <option value="{{ condominio.n_condominio }}">{{ condominio.n_condominio}} - {{ condominio.nome_condominio }}</option>
                        {% endfor %}
                    </select>
                </div>
                <br><br>
                <button id="btnsalvar" type="submit">SALVAR</button>
            </form>
        </div>
    </main>

    <script>
        function validaCPF(cpf) {
            cpf = cpf.replace(/\D+/g, '');
            if (cpf.length !== 11) return false;

            let soma = 0;
            let resto;
            if (/^(\d)\1{10}$/.test(cpf)) return false;

            for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;

            soma = 0;
            for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(10, 11))) return false;

            return true;
        }

        function mascara(i) {
            var v = i.value;

            if (isNaN(v[v.length - 1])) { // Previne a inserção de caracteres que não sejam números
                i.value = v.substring(0, v.length - 1);
                return;
            }

            i.setAttribute("maxlength", "14");
            if (v.length == 3 || v.length == 7) i.value += ".";
            if (v.length == 11) i.value += "-";
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('btnsalvar').addEventListener('click', function (e) {
                var cpf = document.getElementById('cpf_usuario').value;
                if (!validaCPF(cpf)) {
                    e.preventDefault();
                    alert('CPF inválido. Verifique o número digitado.');
                    document.getElementById('cpf_usuario').focus();
                }
            });

            document.getElementById('cpf_usuario').addEventListener('input', function (e) {
                mascara(e.target);
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
