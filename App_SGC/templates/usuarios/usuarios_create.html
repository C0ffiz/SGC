<!doctype html>
<html lang="pt-br">
  <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>CADASTRO DE USUÁRIOS</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/home.css">     
  </head>

  <body>

        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'usuarios_list' %}">CONDOMINIUN</a>
            </div>
        </nav>

        <main class="container">
            <h1>CADASTRO DE USUÁRIOS</h1>

            <div class="painel" style="height: 500px;">

                <form method="POST">
                    {% csrf_token %}
                    <div class="input-bottom">
                        <label>Usuário:</label>  <br>
                        <input  name="username" class="form-control-sm" type="text"> 
                    </div>
                    
                    <div class="input-top input-bottom">
                        <a>Senha:</a> <br>
                        <input name="password" class="form-control-sm" type="password"> <br> 
                    </div> 

                    <div class="input-bottom">
                        <a>CPF Usuário:</a>  <br>
                        <input  name="cpf_usuario" class="form-control-sm" type="tel"> 
                    </div>
                    
                    <div class="input-top input-bottom">
                        <a>Nivel:</a> <br>
                        <input name="nivel" class="form-control-sm" type="number"> <br> 
                    </div> 
                    
                    <div class="input-top input-bottom">
                        <a>Condominio Número:</a> <br>
                        <input name="condominio_numero" class="form-control-sm" type="number"> <br> 
                    </div> 
                    <br>
                    <BUtton type="submit">SALVAR</BUtton>
                </form>  
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
