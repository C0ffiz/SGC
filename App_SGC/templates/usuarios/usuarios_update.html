<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/usuarios.css">
</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'usuarios_list' %}">CONDOMÍNIO</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="titulo">ATUALIZAÇÃO DE USUÁRIOS</h1>

        <div class="painel" style="height: 500px;">
            <form method="POST">
                {% csrf_token %}
                <div class="update-form">
                    <label for="username">Usuário:</label> <br>
                    <input id="username" name="username" class="form-control-sm" type="text" minlength="3"
                        maxlength="30" value="{{ usuarios_list.username }}">
                </div>

                <div class="update-form">
                    <label for="password">Senha:</label> <br>
                    <input id="password" name="password" class="form-control-sm" type="password" minlength="3"
                        maxlength="15" value="{{ usuarios_list.password }}">
                    <br>
                </div>

                <div class="update-form">
                    <label for="cpf_usuario">CPF Usuário:</label> <br>
                    <input id="cpf_usuario" name="cpf_usuario" class="form-control-sm" type="tel" minlength="14"
                        maxlength="14">
                </div>

                <div class="update-form">
                    <label for="nivel">Nível:</label> <br>
                    <input id="nivel" name="nivel" class="form-control-sm" type="number" minlength="2" maxlength="2"
                        value="{{ usuarios_list.nivel }}"> <br>
                </div>

                <div class="update-form">
                    <label for="condominio_numero">Número do Condomínio:</label> <br>
                    <input id="condominio_numero" name="condominio_numero" class="form-control-sm" minlength="2"
                        maxlength="2" type="number" value="{{ usuarios_list.condominio_numero }}"> <br>
                </div>
                <br> <br>
                <button id="btnsalvar" type="submit" value="Update">SALVAR</button>
            </form>
        </div>
    </main>

    <script>
        function validaCPF(cpf) {
            cpf = cpf.replace(/\D+/g, '');
            if (cpf.length !== 11) return false;

            let soma = 0;
            let resto;
            if (/^(\d)\1{10}$/.test(cpf)) return false;

            for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;

            soma = 0;
            for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(10, 11))) return false;

            return true;
        }

        function mascara(i) {
            var v = i.value;

            if (isNaN(v[v.length - 1])) { // Impede a entrada de caracteres que não sejam números
                i.value = v.substring(0, v.length - 1);
                return;
            }

            i.setAttribute("maxlength", "14");
            if (v.length == 3 || v.length == 7) i.value += ".";
            if (v.length == 11) i.value += "-";
        }

        function setupCPFValidation() {
            document.addEventListener('DOMContentLoaded', function () {
                var cpfInput = document.getElementById('cpf_usuario');
                cpfInput.value = formatarCPF("{{ usuarios_list.cpf_usuario }}");

                document.getElementById('btnsalvar').addEventListener('click', function (e) {
                    var cpf = cpfInput.value;
                    if (!validaCPF(cpf)) {
                        e.preventDefault();
                        alert('CPF inválido. Verifique o número digitado.');
                        cpfInput.focus();
                    }
                });

                cpfInput.addEventListener('input', function (e) {
                    mascara(e.target);
                });
            });
        }

        // Call the function to set up CPF validation
        setupCPFValidation();

        function formatarCPF(cpf) {
            return cpf.replace(/^(\d{3})(\d{3})(\d{3})(\d{2})$/, '$1.$2.$3-$4');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
