    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="/static/node_modules/bootstrap/dist/css/bootstrap.css">
        <link rel="stylesheet" href="/static/node_modules/sidebar-skeleton-compostrap/dist/css/sidebar.css">
        <link rel="stylesheet" href="/static/node_modules/@fortawesome/fontawesome-free/css/all.css">
        <link rel="stylesheet" href="/static/node_modules/perfect-scrollbar/css/perfect-scrollbar.css">
        <link rel="stylesheet" href="/static/dist/css/sidebar.menu.css">
    
        <!-- Required meta tags -->
        <!-- <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1"> -->
    
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/usuarios.css">        
        <title>SGC</title>
    </head>

    
    <body>

        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="home">CONDOMINIUN</a>
            </div>
        </nav>

        <main class="container">
            <h1 id="titulo_list">USUÁRIOS DO SISTEMA</h1>

            <div class="container_1">
                <div class="box">
                    <a href="{% url 'usuarios_create' %}" class = "btn btn-primary" id="cadastrar">CADASTRAR USUÁRIOS</a>
                </div>

                <div class="box" id="divBusca">
                    <input type="text" id="txtBusca" placeholder="Buscar..."/>
                    <button id="btnBusca">BUSCAR</button>
                </div>
            </div>         
         
            <table class="table">
                <thead>
                    <tr>       
                        <th scope="col">#</th>                             
                        <th scope="col">USUÁRIO</th>
                        <th scope="col">SENHA</th>
                        <th scope="col">CPF USUÁRIO</th>
                        <th scope="col">NIVEL</th>
                        <th scope="col">CONDOMINIO Nº</th>                                                      
                    </tr>
                </thead>
                
                <tbody>
            
                    {% for usua in usuarios_list %}
                        <tr>
                            <td class="linha">{{ forloop.counter }}</td>
                            <th class="linha" scope="row">{{ usua.pk }}</th>
                            <!-- <td>{{ usua.username }}</td> -->
                            <td>{{ usua.password }}</td>
                            <td>{{ usua.cpf_usuario }}</td>
                            <td>{{ usua.nivel }}</td>                                
                            <td>{{ usua.condominio_numero }}</td>
                            <td style="border: none;">
                                <a href="{% url 'usuarios_update' pk=usua.pk %}" class="btn btn-primary btn-sm">ALTERAR</a>
                                <a href="{% url 'usuarios_delete' pk=usua.pk %}" class="btn btn-danger btn-sm">EXCLUIR</a>
                            </td>
                        </tr>
                    {% endfor %}
                            
                </tbody>
            </table>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
