<!-- templates/moradores/moradores_create.html -->
<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link rel="stylesheet" href="/static/node_modules/@fortawesome/fontawesome-free/css/all.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/condominos.css">
    <style>
        .container-cols {
            display: flex;
            gap: 20px; /* Espaçamento entre as colunas */
        }
        .input-col {
            flex: 1; /* Cada coluna ocupa o mesmo espaço */
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 20px; /* Espaçamento entre as linhas */
        }
        input[type="text"], input[type="date"], select.form-control-sm {
            width: 220px;
            height: 30px;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 10px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#cpf_condomino').mask('000.000.000-00');
            $('#telefone_condomino').mask('(00) 0000-0000');
            $('#celular_condomino').mask('(00) 00000-0000');

            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário
                
                // Valida o CPF                         
                var cpf = $('#cpf_condomino').val().replace(/\D/g, '');
                if (!validaCPF(cpf)) {
                    $('.text-danger').html('CPF inválido');
                    return; // Interrompe o processo se o CPF for inválido
                } else {
                    $('.text-danger').html(''); // Limpa a mensagem de erro se o CPF for válido
                }

                $('#cpf_condomino').val(cpf); // Remove a máscara somente após a validação

                // Mesma lógica para telefone e celular, removendo as máscaras
                var telefone = $('#telefone_condomino').val().replace(/\D/g, '');
                $('#telefone_condomino').val(telefone);

                var celular = $('#celular_condomino').val().replace(/\D/g, '');
                $('#celular_condomino').val(celular);

                // Validação dos campos obrigatórios
                var campos = [
                    $('#cpf_condomino'),
                    $('#nome_condomino'),
                    $('#data_nascimento_condomino'),
                    $('#celular_condomino'),
                    $('#email_condomino')
                ];

                var valid = true;
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo");
                        campos[i].focus();
                        campos[i].blur(); 
                        campos[i][0].reportValidity(); 
                        valid = false;
                        break; 
                    } else {
                        campos[i][0].setCustomValidity(""); 
                    }
                }

                if (valid) {
                    // Se todos os campos forem válidos, submete o formulário
                    $('form').off('submit').submit();
                }
            });
        });

    </script>
</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'condominos_list' %}">CONDOMINIUM</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="titulo">ALTERAÇÃO DE CONDÔMINOS</h1> <br>
        <div class="painel" style="height: 500px;">

            <form method="post" action="{% url 'condominos_update' pk=condominos_list.id %}">
                {% csrf_token %}

                 <!-- Exibir mensagem de erro com espaço fixo -->
                 <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="container-cols d-flex justify-content-center">
                    
                    <!-- Coluna 1 -->
                    <div id="coluna1" class="input-col-md-2">
                        <div class="input-row">
                            <div class="input-bottom">
                                <label for="cpf_condomino">*CPF:</label><br>
                                <input id="cpf_condomino" name="cpf_condomino" class="form-control-sm" type="text" minlength="11" maxlength="11" 
                                    value="{{ condominos_list.cpf_condomino }}" readonly>
                            </div>
                            
                            <div class="input-bottom">
                                <label for="data_nascimento_condomino">*Nascimento:</label><br>
                                <input id="data_nascimento_condomino" name="data_nascimento_condomino" class="form-control-sm" type="date" minlength="10" maxlength="10" 
                                    value="{{ condominos_list.data_nascimento_condomino|date:'Y-m-d' }}" tabindex="2" required>
                            </div>

                            <div class="input-top input-bottom">
                                <label for="celular_condomino">*Celular:</label><br>
                                <input id="celular_condomino" name="celular_condomino" class="form-control-sm" type="text" minlength="11" maxlength="11" 
                                    value="{{ condominos_list.celular_condomino }}" tabindex="4" required>
                            </div>

                            <div class="input-top input-bottom">
                                <label for="data_aquisicao_imovel">*Aquisição imóvel:</label><br>
                                <input id="data_aquisicao_imovel" name="data_aquisicao_imovel" class="form-control-sm" type="date" minlength="10" maxlength="10" 
                                    value="{{ condominos_list.data_aquisicao_imovel|date:'Y-m-d' }}" tabindex="6" required>
                            </div>
                        
                        </div>
                    </div>

                    <!-- Coluna 2 -->
                    <div id="coluna2" class="input-col-md-2">
                        <div class="input-row">
                            <div class="input-top input-bottom">
                                <label for="nome_condomino">*Nome:</label><br>
                                <input id="nome_condomino" name="nome_condomino" class="form-control-sm" type="text" maxlength="40" 
                                    value="{{ condominos_list.nome_condomino }}" tabindex="1" required autofocus>
                            </div>
                        
                            <div class="input-top input-bottom">
                                <label for="telefone_condomino">Telefone:</label><br>
                                <input id="telefone_condomino" name="telefone_condomino" class="form-control-sm" type="text" minlength="10" maxlength="10" 
                                    value="{{ condominos_list.telefone_condomino }}" tabindex="3">
                            </div>

                            <div class="input-top input-bottom">
                                <label for="email_condomino">*E-mail:</label><br>
                                <input id="email_condomino" name="email_condomino" class="form-control-sm" type="text" minlength="4" maxlength="40" 
                                    value="{{ condominos_list.email_condomino }}" tabindex="5" required>
                            </div>  
                        </div>
                    </div>
                    
                </div>
                <br><br>
                <button id="btnsalvar" type="submit">SALVAR</button>

            </form>
        </div> 
    </main>
    <script>
            
        function validaCPF(cpf) {
            cpf = cpf.replace(/\D+/g, '');
            if (cpf.length !== 11) return false;
            if (/^(\d)\1+$/.test(cpf)) return false;
            let soma = 0, resto;
            for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;
            soma = 0;
            for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            return resto === parseInt(cpf.substring(10, 11));
        }

        document.querySelector('form').addEventListener('submit', function(event) {
            const cpfCondominoInput = document.getElementById('cpf_condomino');
            if (!validaCPF(cpfCondominoInput.value)) {
                event.preventDefault();
                alert('CPF inválido');
            } 
        });

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
