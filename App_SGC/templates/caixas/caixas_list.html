<!doctype html>
<html lang="pt-br">
{% load custom_filters %}
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- Folhas de Estilo Externas -->
        <link rel="stylesheet" href="/static/node_modules/@fortawesome/fontawesome-free/css/all.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <!-- Folhas de Estilo Locais -->
        <link rel="stylesheet" href="/static/css/caixas.css">
        <title>SGC</title>
        <style>
            /* altera ambiente do cabeçalho e linha q fica abaixo */
            .auto-layout {
                table-layout: auto; /* Ajusta o layout da tabela conforme o conteúdo */
                margin-left: auto;
                margin-right: auto;
                /* border-collapse: separate; */
                border-spacing: 0px; /* Aumenta a distância entre as colunas */
            }
            /* altera ambiente do botão cadastrar e buscar */
            .box {
                width: 350px;
                height: 32px;
                display: inline-block;
                margin-right: 20px; /* Adiciona margem à direita para separar as divs horizontalmente */
                margin-bottom: 20px; /* Adiciona margem inferior para separar as divs verticalmente */
            }
            #saldo{
                font-size: larger;
            }
            
        </style>
    </head>

    <body>
        <!-- Barra de Navegação -->
        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="home">CONDOMINIUM</a>
            </div>
        </nav>

        <!-- Corpo da Página -->
        <main class="container">
            <h1 id="titulo_list">CAIXAS</h1>

            <!-- Opções de Pesquisa e Cadastro -->
            <div class="container_1">
                <div class="box">
                    <a href="{% url 'caixas_create' %}" class="btn btn-primary" id="cadastrar">CADASTRAR CAIXAS</a>
                </div>

                <div class="box" id="divBusca">
                    <input type="text" id="txtBusca" placeholder="Nome caixa" />
                    <button id="btnBusca">BUSCAR</button>
                </div>

            </div>

            <!-- Tabela de Bancos -->
            <table id="Caixa" class="table auto-layout">
                <thead>
                    <tr>
                        <th scope="col" class="close-th">NOME CAIXA</th>
                        <th scope="col" class="close-th">SALDO</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    {% for caixa in caixas_list %}
                    <tr> 
                        <td>{{ caixa.nome_caixa }}</td>  
                        <td>{{ caixa.saldo_instituicao|currency_brl }}</td>                   
                        <td style="border: none; width:200px">
                            <a href="{% url 'caixas_update' pk=caixa.pk %}" class="btn btn-primary btn-sm">ALTERAR</a>
                            <a href="{% url 'caixas_delete' pk=caixa.pk %}" class="btn btn-danger btn-sm">EXCLUIR</a>
                        </td>
                    </tr>
                {% endfor %}
                
                </tbody>
            </table>
        </main>

        <script> 
            function handleSearch() {
                document.getElementById('txtBusca').addEventListener('input', function () {
                    var searchText = this.value.toLowerCase();
                    var rows = document.querySelectorAll('#Caixa tbody tr'); 
        
                    rows.forEach(function (row) {
                        // Seleciona a coluna com data_vencimento (4 = quinta coluna)
                        var nomeCaixa = row.querySelectorAll('td')[0].textContent.toLowerCase(); 
                        
                        // Verifica se a data contém o texto da busca
                        if (nomeCaixa.includes(searchText)) {
                            row.style.display = '';
                        } else {
                            row.style.display = 'none';
                        }
                    });
                });
            }
        
            document.addEventListener('DOMContentLoaded', function () {
                handleSearch();
            });
        </script>  

        <!-- Bootstrap JavaScript -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
