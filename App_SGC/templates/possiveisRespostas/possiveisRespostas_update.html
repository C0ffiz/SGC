<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/possiveisRespostas.css">

    <style>
        .container-cols {
            display: flex;
            gap: 0; /* Remove o espaçamento entre as colunas */
        }
        .input-bottom {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px; /* Reduz ainda mais o espaçamento entre as divs */
        }
        .input-col .input-row {
            margin-bottom: 10px; /* Diminui o espaçamento entre as linhas */
        }
        /* Define o tamanho dos campos input */
        input[type="text"] {
            width: 500px;
            height: 30px;
            margin: auto;
        }
        /* Define o tamanho dos campos input */
        select.form-control-sm {
            width: 220px;
            height: 30px;
            margin: auto;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }        
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
     
</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'possiveisRespostas_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">ALTERAÇÃO DE POSSÍVEIS RESPOSTAS</h1><br>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'possiveisRespostas_update' possivelResposta.pk %}">
                {% csrf_token %}

                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="input-bottom">
                    <label for="pergunta_id" class="form-label">*Pergunta:</label>
                    <select class="form-control-sm" id="pergunta_id_display" tabindex="1" disabled>
                        <option value="{{ possivelresposta.pergunta_id.pergunta }}" selected>{{ possivelresposta.pergunta_id.pergunta }}</option>
                    </select>
                    <!-- Campo oculto para enviar o valor de pergunta_id -->
                    <input type="hidden" name="pergunta_id" value="{{ possivelresposta.pergunta_id.id }}">
                </div>                

                <div class="input-bottom">
                    <label for="possivel_resposta" class="form-label">*Possível resposta:</label>
                    <input type="text" class="form-control-sm" id="possivel_resposta" name="possivel_resposta" maxlength="60" 
                    value="{{ possivelresposta.possivel_resposta }}" tabindex="1" required autofocus>
                </div>
                <br><br>

                <div class="button-container">
                    <button id="btnsalvar" class="button-style" type="submit" value="Update">SALVAR</button>
                </div>
                
            </form>

        </div>

    </main>

</body>

</html>
