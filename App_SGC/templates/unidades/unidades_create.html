<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/unidades.css">

    <style>
        .container-cols {
            display: flex;
            gap: 0; /* Remove o espaçamento entre as colunas */
        }
        .input-bottom {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 5px; /* Reduz ainda mais o espaçamento entre as divs */
        }
        .input-col .input-row {
            margin-bottom: 10px; /* Diminui o espaçamento entre as linhas */
        }
        input[type="text"], input[type="date"], select.form-control-sm {
            width: 220px;
            height: 30px;
            margin: auto;
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }        
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

    <script>
            
        $(document).ready(function() {
            // Aplica as máscaras aos campos
            $('#cpf_condomino').mask('000.000.000-00');

            // Função para validar CPF
            function validaCPF(cpf) {
                cpf = cpf.replace(/\D+/g, ''); // Remove caracteres não numéricos
                if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

                let soma = 0, resto;
                for (let i = 1; i <= 9; i++) soma += parseInt(cpf.charAt(i - 1)) * (11 - i);
                resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                if (resto !== parseInt(cpf.charAt(9))) return false;

                soma = 0;
                for (let i = 1; i <= 10; i++) soma += parseInt(cpf.charAt(i - 1)) * (12 - i);
                resto = (soma * 10) % 11;
                if (resto === 10 || resto === 11) resto = 0;
                return resto === parseInt(cpf.charAt(10));
            }

            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário

                const cpfCondominoInput = $('#cpf_condomino');
                const formErrorsDiv = $('#form_errors');

                // Limpa as mensagens de erro
                formErrorsDiv.text('');
                $('.text-danger').text('');

                // Remove a formatação antes de validar o CPF
                const cpfCondominoSemMascara = cpfCondominoInput.val().replace(/\D+/g, '');
            
                // Valida o CPF do morador
                if (!validaCPF(cpfCondominoSemMascara)) {
                    formErrorsDiv.text('CPF inválido.');
                    cpfMoradorInput.focus();
                    return false; // Não envia o formulário
                }

                // Verifica os campos obrigatórios
                var campos = [
                    $('#cpf_condomino'),
                    $('#bloco_id'),
                    $('#unidade')
                ];

                var valid = true; // Variável para controlar se todos os campos são válidos
            
                // Consistência em ordem definida
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo"); // Define a mensagem de erro personalizada
                        campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                        valid = false; // Se houver algum campo inválido, marca como falso
                        break; // Interrompe a verificação ao encontrar o primeiro erro
                    } else {
                        campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                    }
                }

                // Só envia o formulário se todos os campos estiverem válidos
                if (valid) {
                    // Remove a máscara e submete o formulário
                    $('#cpf_condomino').val(cpfCondominoSemMascara);
                    $('form').off('submit').submit(); // Desvincula o evento de click e envia o formulário
                }
            });
        });

    </script>
     
</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'unidades_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">CADASTRO DE UNIDADES</h1><br>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'unidades_create' %}">
                {% csrf_token %}

                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="input-bottom">
                    <label for="cpf_condomino" class="form-label">*CPF do Condômino:</label>
                    <input type="text" class="form-control" id="cpf_condomino" name="cpf_condomino" tabindex="1" required autofocus>
                </div>

                <div class="input-bottom">
                    <label for="bloco_id" class="form-label">*Bloco:</label>
                    <select class="form-control-sm" id="bloco_id" name="bloco_id" tabindex="2" required>
                        <option value="">Bloco</option>
                        {% for bloco in blocos %}
                            <option value="{{ bloco.bloco_id }}">{{ bloco.bloco }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-bottom">
                    <label for="unidade" class="form-label">*Unidade:</label>
                    <input type="text" class="form-control" id="unidade" name="unidade" minlength="1" maxlength="4" tabindex="3" required>
                </div><br><br>

                <button type="submit" class="btn btn-primary" id="btnsalvar">SALVAR</button>
            </form>
        </div>
    </main>
</body>
</html>
