<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/unidades.css">

    <style>
        .container-cols {
            display: flex;
            gap: 20px; /* Espaçamento entre as colunas */
        }
        .input-col {
            flex: 1; /* Cada coluna ocupa o mesmo espaço */
            display: flex;
            flex-direction: column;
        }
        .input-col .input-row {
            margin-bottom: 80px; /* Espaçamento entre as linhas */
        }
        .input-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px; /* Espaçamento entre as linhas */
        }
        input[type="text"], input[type="date"], select.form-control-sm {
            width: 220px;
            height: 30px;
            margin: auto;
        }
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#cpf_condomino').mask('000.000.000-00');
            $('#btnsalvar').click(function(event) {
                 var cpf = $('#cpf_condomino').val().replace(/\D/g, '');
            $('#cpf_condomino').val(cpf);
            });
        });
    </script>
</head>
<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'unidades_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">CADASTRO DE UNIDADES</h1><br>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'unidades_create' %}">
                {% csrf_token %}

                <div class="input-bottom">
                    <label for="cpf_condomino" class="form-label">CPF do Condômino:</label>
                    <input type="text" class="form-control" id="cpf_condomino" name="cpf_condomino" required tabindex="1" autofocus>
                    {% if form_errors.cpf_condomino %}
                        <div class="text-danger">{{ form_errors.cpf_condomino }}</div>
                    {% endif %}
                </div>

                <div class="input-bottom">
                    <label for="bloco_id" class="form-label">Bloco:</label>
                    <select class="form-control-sm" id="bloco_id" name="bloco_id" tabindex="2" required>
                        <option value="">Bloco</option>
                        {% for bloco in blocos %}
                        <option value="{{ bloco.bloco_id }}">{{ bloco.bloco }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-bottom">
                    <label for="unidade" class="form-label">Unidade:</label>
                    <input type="text" class="form-control" id="unidade" name="unidade" minlength="1" maxlength="4" tabindex="3" required>
                    {% if form_errors.unidade %}
                        <div class="text-danger">{{ form_errors.unidade }}</div>
                    {% endif %}
                </div><br><br>

                <button type="submit" class="btn btn-primary" id="btnsalvar">Salvar</button>
            </form>
        </div>
    </main>
</body>
</html>
