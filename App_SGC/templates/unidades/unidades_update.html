<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/unidades.css">

    <style>
        .container-cols {
            display: flex;
            gap: 0; /* Remove o espaçamento entre as colunas */
        }
        .input-bottom {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0; /* Remove margem das divs de entrada */
            padding: 0; /* Remove padding das divs de entrada */
        }
        label.form-label {
            margin-bottom: 2px; /* Reduz a margem inferior do label */
        }
        .input-col .input-row {
            margin-bottom: 10px; /* Diminui o espaçamento entre as linhas */
        }
        input[type="text"], select.form-control-sm {
            width: 220px;
            height: 30px;
            margin-bottom: 5px; /* Aplica margem mínima entre os inputs */
        }
        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
            height: 30px; /* Espaço reservado para a mensagem de erro */
            line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
            margin-bottom: 20px; /* Margem inferior */
            color: rgb(246, 244, 244) !important; /* Cor branca */
            font-weight: bold; /* Negrito */
        }        
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
            
        $(document).ready(function() {
            // Aplica as máscaras aos campos
            $('#cpf_condomino').mask('000.000.000-00');
           
            $('#btnsalvar').click(function(event) {
                event.preventDefault(); // Impede o envio automático do formulário

                const cpfCondominoInput = $('#cpf_condomino');
                const formErrorsDiv = $('#form_errors');

                // Limpa as mensagens de erro
                formErrorsDiv.text('');
                $('.text-danger').text('');

               
                // Verifica os campos obrigatórios
                var campos = [
                    $('#bloco_id'),
                    $('#unidade')
                ];

                var valid = true; // Variável para controlar se todos os campos são válidos
            
                for (var i = 0; i < campos.length; i++) {
                    if (!campos[i].val()) {
                        campos[i][0].setCustomValidity("Preencha este campo");
                        campos[i].focus();
                        campos[i].blur(); // Força a exibição da mensagem pop-up
                        campos[i][0].reportValidity(); // Exibe a mensagem de campo obrigatório
                        valid = false; // Define como falso se algum campo estiver vazio
                        break; // Para a execução do loop após encontrar o primeiro campo vazio
                    } else {
                        campos[i][0].setCustomValidity(""); // Limpa a mensagem de erro se o campo estiver preenchido
                    }
                }

                // Só envia o formulário se todos os campos estiverem válidos
                if (valid) {                   
                    $('form').off('submit').submit(); // Desvincula o evento de click e envia o formulário
                }
            });
        });

    </script>

</head>

<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'unidades_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo">ATUALIZAÇÃO DE UNIDADES</h1><br>

        <div class="painel" style="height: 500px;">
            <form method="POST" action="{% url 'unidades_update' unidade.unidade_id %}">
                {% csrf_token %}

                <div class="text-danger" id="form_errors">
                    {% if messages %}
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>

                <div class="input-bottom">
                    <label for="cpf_condomino" class="form-label">*CPF do Condômino:</label>
                    <input type="text" class="form-control-sm" id="cpf_condomino" name="cpf_condomino" readonly
                            value="{{ unidade.cpf_condomino.cpf_condomino }}">
                </div>

                <div class="input-bottom">
                    <label for="bloco_id" class="form-label">*Bloco:</label>
                    <select class="form-control-sm" id="bloco_id" name="bloco_id" tabindex="1" required autofocus>
                        <option value="">Bloco</option>
                        {% for bloco in blocos %}
                            <option value="{{ bloco.bloco_id }}" {% if bloco.bloco_id == unidade.bloco_id.bloco_id %}selected{% endif %}>{{ bloco.bloco }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-bottom">
                    <label for="unidade" class="form-label">*Unidade:</label>
                    <input type="text" class="form-control-sm" id="unidade" name="unidade" minlength="3" maxlength="4" tabindex="1"
                             value="{{ unidade.unidade }}" required>
                </div><br><br>

                <button type="submit" class="btn btn-primary" id="btnsalvar" value="Update">SALVAR</button>

            </form>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
    </script>

</body>
</html>
