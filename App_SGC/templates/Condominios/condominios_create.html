<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/condominios.css">
    <style>
    /* Define o tamanho dos campos input */
    input[type="text"] {
        width: 220px;
        height: 30px;
        margin: auto;
    }

    /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
    .text-danger {
        font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
        height: 30px; /* Espaço reservado para a mensagem de erro */
        line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
        margin-bottom: 20px; /* Margem inferior */
        color: rgb(246, 244, 244) !important; /* Cor branca */
        font-weight: bold; /* Negrito */
    }   
    </style>
</head>

<body>

    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'condominios_list' %}">CONDOMINIUM</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="titulo">CADASTRO DE CONDOMÍNIOS</h1><br>

        <div class="painel" style="height: 500px;">

            <form method="POST">
                {% csrf_token %}
               
                <!-- Exibir mensagem de erro com espaço fixo -->
                <div class="text-danger">
                    {% for message in messages %}
                        <div>{{ message }}</div>
                    {% endfor %}
                </div>
                                  

                <div class="input-top input-bottom">
                    <label for="password">*Nome Condomínio:</label> <br>
                    <input id="nome_condominio" name="nome_condominio" class="form-control-sm" type="text" minlength="3"
                        maxlength="50" required autofocus> <br>
                </div>
                <br><br><br>
                <button id="btnsalvar" type="submit">SALVAR</button>
            </form>
        </div>
    </main>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
    </script>
</body>

</html>
