<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/condominios.css">
</head>

<body>

    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'condominios_list' %}">CONDOMINIUM</a>
        </div>
    </nav>

    <main class="container">
        <h1 id="titulo">CADASTRO DE CONDOMÍNIOS</h1><br>

        <div class="painel" style="height: 500px;">

            <form method="POST">
                {% csrf_token %}
                <div>
                    {% if form.errors %}
                    <div class="alert alert-danger error-duplicate" role="alert">
                        <strong>Erro:</strong> Por favor, corrija os seguintes erros:<br>
                        <ul>
                            {% for field, errors in form.errors.items %}
                            {% for error in errors %}
                            <li strong>{{ error }}</li>
                            {% endfor %}
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}
                </div>

                <div class="input-bottom">
                    <label for="n_condominio">Número Condomínio:</label> <br>
                    <input id="n_condominio" name="n_condominio" class="form-control-sm" type="text" minlength="1"
                        maxlength="3"> <br><br>
                </div>

                <div class="input-top input-bottom">
                    <label for="password">Nome Condomínio</label> <br>
                    <input id="nome_condominio" name="nome_condominio" class="form-control-sm" type="text" minlength="3"
                        maxlength="50"> <br>
                </div>
                <br><br><br>
                <button id="btnsalvar" type="submit">SALVAR</button>
            </form>
        </div>
    </main>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
    </script>
</body>

</html>
