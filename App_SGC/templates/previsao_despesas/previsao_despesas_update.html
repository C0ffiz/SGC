<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SGC</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <link rel="stylesheet" href="/static/css/previsao_despesas.css">

    <style>
        /* Espaçamento entre os campos na mesma linha */
        .row-inputs {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Ajuste para largura dos campos */
        input[type="text"], input[type="number"], select.form-control-sm {
            width: 220px;
            height: 30px;
        }

        /* Define o tamanho do botão salvar */
        #btnsalvar {
            display: block;
            margin: auto;
            width: 140px;
        }

        /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
        .text-danger {
            font-size: 20px; 
            height: 30px; 
            line-height: 30px;
            margin-bottom: 20px;
            color: rgb(246, 244, 244) !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'previsao_despesas_list' %}">CONDOMINIUM</a>
        </div>
    </nav>
    <main class="container">
        <h1 id="titulo" class="text-center">ALTERAÇÃO DA PREVISÃO DE DESPESAS</h1><br>
        
        <div class="painel" style="height: 500px;">
            <!-- Centralizando o formulário horizontalmente -->
            <div class="d-flex justify-content-center">
                <form method="POST" action="{% if form.instance.pk %}{% url 'previsao_despesas_update' form.instance.pk %}{% else %}{% url 'previsao_despesas_create' %}{% endif %}">
                    {% csrf_token %}
                    
                    <div class="text-danger text-center">
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    </div>

                    <!-- Alinhamento dos inputs ano_orcamento e mes_orcamento -->
                    <div class="row-inputs">

                        <div>
                            <label for="ano_orcamento" class="form-label">*Ano:</label><br>
                            <input type="text" class="form-control-sm" id="ano_orcamento" name="ano_orcamento" readonly> 
                        </div>

                        <div>
                            <label for="mes_orcamento" class="form-label">*Mês:</label><br>
                            <input type="text" class="form-control-sm" id="mes_orcamento" name="mes_orcamento" readonly> 
                        </div>

                    </div>

                    <!-- Alinhamento dos inputs categoria e valor_orcamento_despesa -->
                    <div class="row-inputs">

                        <div>
                            <label for="categoria" class="form-label">*Conta:</label><br>
                            <input type="text" class="form-control-sm" id="categoria" name="categoria" 
                                   value="{{ form.instance.categoria.nome }}" readonly>
                        </div>

                        <div>
                            <label for="valor_orcamento_despesa" class="form-label">*Valor previsão:</label><br>
                            <input type="text" class="form-control-sm" id="valor_orcamento_despesa" name="valor_orcamento_despesa" 
                                value="{{ form.valor_orcamento_despesa.value|stringformat:'0.2f' }}" tabindex="1" required autofocus>
                        </div>

                    </div>
                    
                    <br><br>
                    <button type="submit" class="btn btn-primary" id="btnsalvar">SALVAR</button>
               </form>
            </div>
        </div>
    </main>

    <script>
        $(document).ready(function(){
            $('#valor_orcamento_despesa').mask('000.000.000.000.000,00', {reverse: true});
            
            $('form').submit(function() {
                $('#valor_orcamento_despesa').each(function(){
                    var valor = $(this).val().replace(/\./g, '').replace(',', '.');
                    $(this).val(valor);
                });

                var input = $('#data_orcamento_despesa').val();
                var parts = input.split('-');
                if (parts.length === 2) {
                    var formattedDate = parts[1] + '-' + parts[0] + '-01';
                    $('#data_orcamento_despesa').val(formattedDate);
                }
            });

            $('#data_orcamento_despesa').datepicker({
                format: "mm-yyyy",
                startView: "months",
                minViewMode: "months",
                autoclose: true,
            }).on('changeDate', function(e) {
                $(this).datepicker('hide');
            });
        });
    </script> 

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const anoOrcamento = "{{ ano_orcamento|default:'' }}";
            const mesOrcamento = "{{ mes_orcamento|default:'' }}";
            
            document.getElementById("ano_orcamento").value = anoOrcamento;
            document.getElementById("mes_orcamento").value = mesOrcamento;
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybBogGzF9RAp6F3E6pbb7zJpPHT6f6Ffhh0GgiVNU7BRSK7jl" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-QF2mxF1WBbKV5wzELpLhjlbsABsUcQ8Lqyf2z5LN6go6abkFZxWfXaBgEKTt9iZS" crossorigin="anonymous"></script>

</body>
</html>
