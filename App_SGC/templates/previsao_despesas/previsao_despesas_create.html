<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SGC</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- jQuery -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <!-- jQuery Mask -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
        <!-- Bootstrap Datepicker CSS -->
        <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css" rel="stylesheet">
        <!-- Bootstrap Datepicker JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
        <!-- CSS -->
        <link rel="stylesheet" href="/static/css/previsao_despesas.css">

        <style>
            /* Espaçamento entre as colunas */
            .container-cols {
                display: flex;
                gap: 20px; 
            }
            
            /* Cada coluna ocupa o mesmo espaço */
            .input-col {
                flex: 1; 
                display: flex;
                flex-direction: column;
            }
            
            /* Espaçamento entre as linhas */
            .input-bottom {
                margin-bottom: 30px; 
            }
            
            /* Espaçamento entre o label e o input */
            .input-bottom label {           
                margin-bottom: 5px; 
            }
            
            /* Define o tamanho dos campos input */
            input[type="text"], input[type="number"], input[type="date"], input[type="time"], select.form-control-sm {
                width: 220px;
                height: 30px;
                margin: auto;
            }
            
            /* Define o tamanho do botão salvar */
            #btnsalvar {
                display: block;
                margin: auto;
                width: 140px;
            }
            
            /* Tamanho da fonte, cor e negrito para a MENSAGEM de erro */
            .text-danger {
                font-size: 20px; /* Aumenta o tamanho da letra da mensagem de erro */
                height: 30px; /* Espaço reservado para a mensagem de erro */
                line-height: 30px; /* Centraliza verticalmente o texto da mensagem */
                margin-bottom: 20px; /* Margem inferior */
                color: rgb(246, 244, 244) !important; /* Cor branca */
                font-weight: bold; /* Negrito */
            }
            
            /* Alinha o checkbox logo abaixo do seletor de mês */
            .checkbox-wrapper {
                margin-top: 10px; /* Ajuste conforme necessário */
                display: flex;
                align-items: center;
            }
        
            /* Ajusta o tamanho do checkbox */
            input[type="checkbox"] {
                width: 0.4cm;
                height: 0.4cm;
            }
        </style>
    
    </head>
    <body>
        <nav class="navbar bg-dark mb-30" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'previsao_despesas_list' %}">CONDOMINIUM</a>
            </div>
        </nav>
        <main class="container">
            <h1 id="titulo">CADASTRO PREVISÃO DE DESPESAS</h1><br>
            
            <div class="painel" style="height: 500px;">
                <form method="post" id="previsao_despesas_form">
                    {% csrf_token %}
    
                    <div class="text-danger">
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    </div>
    
                    <div class="container-cols d-flex justify-content-center">
                        
                        <!-- Coluna 1 -->
                        <div id="coluna1" class="input-col-md-2">                   
    
                            <div>
                                <label for="ano_orcamento">*Ano:</label><br>
                                <select id="ano_orcamento" tabindex="1" autofocus></select>
                            </div><br><br>      
    
                            <div class="input-bottom">
                                <label for="id_parent" class="form-label">*Conta:</label>
                                <select name="categoria" id="id_categoria" class="form-control-sm" tabindex="4" required>
                                    <option value="">Conta</option>
                                    {% for categoria in categorias %}
                                    <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
                                    {% endfor %}
                                </select>
                            </div>
    
                        </div>
    
                        <!-- Coluna 2 -->
                        <div id="coluna2" class="input-col-md-2">
                            <div>
                                <label for="mes_orcamento">*Mês:</label><br>
                                <select id="mes_orcamento" tabindex="2">
                                    <option value="1">Janeiro</option>
                                    <option value="2">Fevereiro</option>
                                    <option value="3">Março</option>
                                    <option value="4">Abril</option>
                                    <option value="5">Maio</option>
                                    <option value="6">Junho</option>
                                    <option value="7">Julho</option>
                                    <option value="8">Agosto</option>
                                    <option value="9">Setembro</option>
                                    <option value="10">Outubro</option>
                                    <option value="11">Novembro</option>
                                    <option value="12">Dezembro</option>
                                </select>
                            </div>
                            
                            <div>
                                <label for="select_all">
                                    <input type="checkbox" id="select_all" name="multiplas_entradas" style="width: 0.4cm; height: 0.4cm;" onchange="toggleAll(this)" tabindex="3">
                                    Selecionar a partir deste mês
                                </label>
                            </div><br>
    
                            <div class="input-bottom">
                                <label for="valor_orcamento_despesa" class="form-label">*Valor previsão:</label>
                                <input type="text" class="form-control-sm" id="valor_orcamento_despesa" name="valor_orcamento_despesa" tabindex="5" required>
                           </div>          
    
                        </div>
                    </div>
                    
                    <!-- Campo oculto para data_orcamento_despesa -->
                    <input type="hidden" id="data_orcamento_despesa" name="data_orcamento_despesa">
                    
                    <br><br>
                    
                    <button type="submit" class="btn btn-primary btnsalvar">SALVAR</button>
               </form>
            </div>
        </main>
        
        <script>
            $(document).ready(function(){
                // Aplicar a máscara de moeda ao carregar a página
                $('#valor_orcamento_despesa').mask('000.000.000.000.000,00', {reverse: true});
                
                // Remover a máscara antes de enviar o formulário
                $('form').submit(function() {
                    $('#valor_orcamento_despesa').each(function(){
                        var valor = $(this).val().replace(/\./g, '').replace(',', '.');
                        $(this).val(valor);
                    });
                });
            });
        </script>
    
        <script>
            // Popula os anos dinamicamente no seletor de ano
            function populateYears(startYear, endYear) {
                const selectYear = document.getElementById('ano_orcamento');
                selectYear.innerHTML = '';
                for (let year = startYear; year <= endYear; year++) {
                    const option = document.createElement('option');
                    option.value = year;
                    option.textContent = year;
                    selectYear.appendChild(option);
                }
            }
    
            // Chama a função para preencher o seletor de ano com base no ano atual
            const currentYear = new Date().getFullYear();
            populateYears(currentYear, currentYear + 10);
    
            // Preenche o campo oculto com a data completa ao enviar o formulário
            document.querySelector('form').addEventListener('submit', function(e) {
                const ano = document.getElementById('ano_orcamento').value;
                const mes = document.getElementById('mes_orcamento').value.padStart(2, '0'); // Garante dois dígitos para o mês
                const dataCompleta = `${ano}-${mes}-01`; // Define como o primeiro dia do mês
                document.getElementById('data_orcamento_despesa').value = dataCompleta;
            });
        </script>
        <script>
            document.getElementById('previsao_despesa_form').addEventListener('submit', function() {
            document.getElementById('submit_button').disabled = true; // Desabilita o botão de envio
            });
        </script>
        <!-- Seus scripts de Bootstrap -->
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybBogGzF9RAp6F3E6pbb7zJpPHT6f6Ffhh0GgiVNU7BRSK7jl" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-QF2mxF1WBbKV5wzELpLhjlbsABsUcQ8Lqyf2z5LN6go6abkFZxWfXaBgEKTt9iZS" crossorigin="anonymous"></script>
    
    </body>
    </html>
